# Известия — короткие срочные уведомления администрации.
# Показываются полосой над баннерами на главной И как раздел «Известия»
# (/izvestiya — список, /izvestiya/<id> — страница-известие по шаблону Notice).
# kind: urgent (Срочно, красный) | important (Важно, оранжевый) | info (Объявление, синий).
# date: дата публикации (ГГГГ-ММ-ДД) — по ней сортируется лента, свежие сверху.
# until — дата, ДО которой действует/показывается (ГГГГ-ММ-ДД); после — исчезает.
# id — уникальный (адрес /izvestiya/<id> и функция «скрыть»). issuedBy — кто выпустил.
# body — абзацы текста на странице-известии. Правьте здесь.

- id: priem-2026
  kind: important
  date: "2026-06-20"      # ПРОВЕРЬТЕ дату публикации (сейчас — заготовка)
  title: Приём документов до 25 июля
  text: Подача заявлений на специалитет и бакалавриат
  issuedBy: Приёмная комиссия
  until: "2026-07-25"
  body:
    - Последний день подачи документов для поступления на специалитет и бакалавриат — 25 июля. Заявления принимаются лично, по почте и через суперсервис «Поступление в вуз онлайн».
    - Абитуриентам, поступающим по результатам ЕГЭ, необходимо подать согласие на зачисление в установленные сроки. Адрес, часы работы и перечень документов — на странице приёмной комиссии.

- id: raspisanie-sessii
  kind: info
  date: "2026-06-30"      # ПРОВЕРЬТЕ дату публикации (сейчас — заготовка)
  title: Опубликовано расписание летней сессии
  text: ""
  issuedBy: Учебное управление
  until: "2026-08-01"
  body:
    - Расписание летней экзаменационной сессии размещено в личных кабинетах обучающихся и на информационных стендах кафедр.
    - Проверьте даты консультаций и экзаменов по своей группе. При расхождениях обращайтесь в деканат факультета.

