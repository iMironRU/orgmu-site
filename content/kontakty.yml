# Страница «Контакты» — верхний контактный блок (макет Contacts.dc.html).
#
# Раньше он собирался разбором строк подвала по двоеточию: «Тел. +7 (3532)
# 50-06-20» превращалось в подпись «Телефон» наугад, а «E-mail: office@…» —
# в подпись «E-mail». Здесь подписи заданы явно.
#
# icon — какая иконка слева: pin | clock | phone | mail (других макет не знает).
# href — необязателен; без него значение выводится текстом, без ссылки.

contacts:
  - icon: pin
    label: Адрес
    value: "г. Оренбург, ул. Советская, д. 6"

  # ЗАПОЛНИТЬ: часы работы университета и перерыв. Данных на orgma.ru нет,
  # спросить в канцелярии. Пока строка не заполнена — блок не показывается.
  - icon: clock
    label: Часы работы
    value: ""

  - icon: phone
    label: Телефон
    value: "+7 (3532) 50-06-20"

  - icon: phone
    label: Приёмная комиссия
    value: "+7 (3532) 50-06-03"

  - icon: mail
    label: E-mail
    value: "office@orgma.ru"

  - icon: mail
    label: Техническая поддержка
    value: "www@orgma.ru"
