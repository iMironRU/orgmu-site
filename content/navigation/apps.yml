# Реестр приложений вуза. Используется выезжающей панелью в SideRail
# (только featured) и страницей /prilozheniya (все, с фильтром по аудитории).
#
# id        — часть адреса карточки /prilozheniya/<id>
# audience  — КОМУ: students | staff | applicants. Списком: СДО нужна и
#             студентам, и преподавателям. Главный фильтр на странице.
# platform  — 1c | web. Чтобы «много 1С» было видно и группируемо.
# status    — active | updating | legacy (выводится из эксплуатации)
# auth      — none | account | vpn. Честная подпись вместо иллюзии защиты.
# replacedBy — id приложения-замены (для status: legacy). Переходный период:
#             старое не удаляем молча, а показываем, чем заменено.
# featured  — показывать в выезжающей панели SideRail (3–5 публичных).
#
# ⚠️ Служебные системы (adm/buh/dev) перечислены осознанно: они и так открыты
# без входа на app.orgma.ru и индексируются поисковиками. Прятать их здесь —
# не защита, а её видимость. Делим по аудитории, а не по секретности.

