# Платные образовательные услуги (макет PaidServices.dc.html).
#
# Здесь ТОЛЬКО то, чего нет в других источниках — приказы об утверждении
# стоимости. Сами цены не дублируем:
#   - цена за год берётся из парсинга sveden (поле price программы);
#   - стоимость по курсам — из content/programs/pages/<код>.yml, ключ cost.
# Иначе получится два источника правды и они разъедутся.
#
# Правьте здесь — сайт пересоберётся при коммите.

# Годы наборов для вкладок. Первый в списке — открывается по умолчанию.
years: []
# Пример:
# years: ["2026", "2025", "2024"]

# Вводный текст раздела (необязательно).
lead: "—"

# Приказы об утверждении стоимости обучения — по годам набора.
# Файлы выводятся карточками DocCards (см. AGENTS.md): формат берётся из
# адреса, дату и размер соберёт scripts/pages/enrich-files.mjs.
orders: {}
# Пример:
# orders:
#   "2026":
#     - name: Об утверждении стоимости обучения на 2026/2027 учебный год
#       note: Приказ № —  от —
#       href: "https://www.orgma.ru/files/…"
#   "2025":
#     - name: —
#       href: "#"
