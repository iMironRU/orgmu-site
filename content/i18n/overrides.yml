# Ручные правки машинного перевода.
#
# Здесь перечислены строки, где автоперевод ошибся или прозвучал коряво.
# Скрипт scripts/i18n/apply-overrides.mjs переносит их в память переводов со
# статусом "human" — после этого машина эти строки не трогает никогда.
#
# Как пополнять: находите кривой перевод на сайте, добавляете сюда русский
# оригинал и правильный вариант, запускаете скрипт. Формат:
#
#   "Русский оригинал":
#     en: "Correct English"
#     kk: "Дұрыс аудармасы"        # необязательно
#
# Указывать можно только один язык — второй останется машинным.

# ─── Аббревиатуры: машина их не понимает и выдаёт бессмыслицу ───
"НИЦ":
  en: "Research Center"          # было PROSTRATE (!)
  kk: "ҒЗО"
"СНО":
  en: "Student Research Society" # было SNO
  kk: "Студенттік ғылыми қоғам"  # было «Арман» — по-казахски «мечта» (!)

# ─── Слова, у которых машина взяла не то значение ───
"Руководство":
  en: "Leadership"               # было Guide — это про людей, а не инструкцию
"Объявление":
  en: "Announcement"             # было Advertisement — это не реклама
"Наука":
  en: "Research"                 # было The science
"Известия":
  en: "Notices"                  # было Izvestia (транслит названия газеты)
"Практика":
  en: "Clinical practice"        # было Practice — у медиков это практика на базе
"Подразделения":
  en: "Departments"              # было Divisions
"Схема проезда":
  en: "How to find us"           # было Driving directions
"Наверх":
  en: "Back to top"              # было Up

# ─── Термины российского образования ───
"Поступающим":
  en: "Admissions"               # было Incoming
"Специалитет":
  en: "Specialist degree"        # было Specialty — это 5–6-летняя ступень
"Диссертационные советы":
  en: "Dissertation councils"    # было Dissertation advice
"Афиша мероприятий":
  en: "Events calendar"          # было Event poster
"Дубликат диплома":
  en: "Diploma duplicate"
"Приложения вуза":
  en: "Apps and services"        # было University Applications (читалось как заявления)
"Спорт и творчество":
  en: "Sports and arts"          # было Sports and creativity

# ─── Кнопки: машина переводит их как обычные слова ───
"Хорошо":
  en: "OK"                       # было Well — это кнопка согласия, не наречие
  kk: "Жарайды"
"Подразделы":
  en: "Sections"                 # было Subsections — в sveden это просто разделы

# ─── Академические должности и степени ───
"Доцент":
  en: "Associate Professor"      # было Docent — это транслит, не должность
"Кафедра":
  en: "Department"               # закрепляем: в структуре и в справочнике одинаково
"Подразделение":
  en: "Unit"                     # было Division — у нас это любое подразделение
"Орган управления":
  en: "Governing body"           # было The management body
"Управление":
  en: "Directorate"              # было Management — здесь это тип подразделения
"В составе":
  en: "Subordinate units"        # было As part of — это заголовок списка
"Объекты":
  en: "Facilities"               # было Objects — речь о корпусах и базах
"Места осуществления деятельности":
  en: "Locations"                # было Places of activity
"Доступно для МГН":
  en: "Step-free access"         # было Available for MGN — аббревиатура нечитаема
  kk: "Кедергісіз қолжетімділік" # было MGN үшін қол жетімді
"стаж по специальности":
  en: "years in the field"       # рядом с числом: «21 years in the field»

# ─── Стаж: слово рядом с числом («21 years»), не «years old» ───
"лет":
  en: "years"
  kk: "жыл"

# ─── Название университета: машина задваивала «University» ───
"Оренбургский государственный медицинский университет":
  en: "Orenburg State Medical University"   # было Orenburg State University Medical University

# ─── Подпись под числом лет стажа в плитке педсостава ───
"стаж, лет":
  en: "years of experience"      # не «experience, years»: единица уже в подписи
  kk: "жұмыс өтілі, жыл"
