  body:
    - Организаторами выступили кафедра неврологии, медицинской генетики университета и Оренбургская областная клиническая больница им. В.И. Войнова. В рамках конференции выступили спикеры из Оренбурга и других городов.
  sourceHref: /novosti/orenburgskij-medicinskij-universitet-sobral-na-svoej-ploshchadke-nevrologov-strany
