# date — ГГГГ-ММ-ДД. Раздел сам делит на «Предстоящие» и «Прошедшие» по этой дате.
# body — абзацы описания. program — пункты { time, title, place }.
# sourceHref/sourceLabel — откуда взяты сведения (показывается в карточке).
