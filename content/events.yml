  date: "2026-07-12"
  time: "В течение дня"
  place: СКК «Оренбуржье»
  lead: Документ о высшем образовании получили 282 студента, 19 из них окончили университет с красным дипломом.
  body:
    - В зале спортивно-культурного комплекса собрались администрация и профессорско-преподавательский состав вуза, родители и гости праздника. Поздравить молодых специалистов пришёл министр здравоохранения Оренбургской области Андрей Шатилов.
  sourceHref: /novosti/v-skk-orenburzh-e-proshlo-torzhestvennoe-vruchenie-diplomov-85-mu-vypusku-lechebnogo-fakul-teta-orgmu
