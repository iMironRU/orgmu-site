# ШАБЛОН страницы программы (макет ProgramPage.dc.html).
# Скопируйте в этот же каталог под именем <код>.yml — например «31.05.01.yml»,
# и заполните. Страница соберётся сама; чего нет — покажется прочерком.
#
# Общие сведения (название, код, уровень, форма, срок, факультет) берутся из
# парсинга sveden и programs-extra.yml — здесь их дублировать не нужно.
# Здесь только то, чего в парсинге нет: разделы макета ProgramPage.
#
# Всё необязательно: пустой блок или прочерк — страница покажет заготовку.

# ── Плашки-факты в шапке (4 штуки в макете) ───────────────────────────────
facts:
  - { value: "—", label: Срок обучения }
  - { value: "—", label: Форма }
  - { value: "—", label: Бюджетных мест }
  - { value: "—", label: Проходной балл }

# ── О программе ───────────────────────────────────────────────────────────
about: "—"          # 1–2 абзаца текста. Длинный текст — в кавычках.
career: []          # кем работать после выпуска, списком строк

# ── Вступительные испытания ───────────────────────────────────────────────
# min — минимальный балл; prio: «Профильный» | «—»
exams:
  - { subject: "—", min: "—", prio: "—" }

# Проходные баллы прошлых лет (плашки под таблицей испытаний)
scores:
  - { year: "—", value: "—" }

# ── Места приёма и стоимость ──────────────────────────────────────────────
places:
  budget: "—"       # бюджетных мест (КЦП)
  target: "—"       # целевая квота
  paid: "—"         # места по договору

# Стоимость по годам набора. Ключ — год набора, значение — цена по курсам
# (1-й курс, 2-й, …). В макете это вкладки: год → таблица по курсам + итог.
cost:
  # "2026":
  #   - { course: 1 курс, price: "— ₽" }
  #   - { course: 2 курс, price: "— ₽" }

# ── Конкурсные группы ─────────────────────────────────────────────────────
groups:
  - { name: "—", note: "—", places: "—" }

# ── Численность обучающихся ───────────────────────────────────────────────
# form — форма обучения; foreign — иностранные граждане
counts:
  - { form: "—", budget: "—", paid: "—", foreign: "—" }

# ── Вакантные места для приёма (перевода) ─────────────────────────────────
vacant:
  - { course: "—", budget: "—", paid: "—" }

# ── Учебные планы и документы ─────────────────────────────────────────────
# Вкладки по годам набора. Файлы — карточками DocCards (см. AGENTS.md):
# формат берётся из адреса, дату и размер соберёт scripts/pages/enrich-files.mjs.
docs:
  # - year: Набор 2026/2027
  #   files:
  #     - { name: Учебный план, href: "https://www.orgma.ru/files/…" }
  #     - { name: Аннотации рабочих программ дисциплин, href: "…" }
  #     - { name: Календарный учебный график, href: "…" }
  #     - { name: Рабочая программа воспитания, href: "…" }
  #     - { name: Календарный план воспитательной работы, href: "…" }

# ── Подпись под документами (кто утвердил) ────────────────────────────────
sign:
  signer: "—"       # например: Ректор Мирошниченко И.В.
  valid: "—"        # например: 12.2026
