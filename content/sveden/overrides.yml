# Ручные исправления/дополнения полей sveden (переопределяют парсинг).
# Формат: <раздел>: { <поле>: <значение> }.
# Пустая строка "" → поле показывается как «отсутствует» (до заполнения реальным).
# Ссылка на файл — { text: "...", href: "..." }.

common:
  # парсинг захватил подпись-заголовок вместо значения — исправлено вручную:
  fullName: "федеральное государственное бюджетное образовательное учреждение высшего образования «Оренбургский государственный медицинский университет» Министерства здравоохранения Российской Федерации"
  # ниже тоже были захвачены подписи — очищено, заполните реальными данными/ссылками:
  licenseDocLink: ""        # ссылка на лицензию: { text: "Лицензия…", href: "/sveden/…pdf" }
  accreditationDocLink: ""  # ссылка на свидетельство о госаккредитации
  addressPlaceDop: ""       # места осуществления образовательной деятельности
  addressPlaceSet: ""       # места при сетевой форме
  addressPlacePrac: ""      # места проведения практики
  addressPlaceGia: ""       # места проведения ГИА
  addressPlaceOppo: ""      # места реализации программ проф. обучения

grants:
  hostelNumOvz: ""  # мест в общежитии для инвалидов и лиц с ОВЗ (был захвачен заголовок)
  interNumOvz: ""   # мест в интернате для инвалидов и лиц с ОВЗ
