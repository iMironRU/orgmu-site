# Словарь микроразметки sveden. base = стабильное ядро. Дельты приказов — append-only.
# Источник истины: Методические рекомендации Рособрнадзора v9.0.0 (Москва 2025).
# Поле: { itemprop, from: <путь в data> }. status: verified/TBD.
# Принцип «универсальности»: словарь покрывает ВСЕ атрибуты документа, без оглядки
#   на конкретную ОО. «Отсутствует»/«0» НЕ зашивается в словарь как const — это
#   результат пустых данных на рендере (правило «отсутствует» в _global.yaml).
# from: "TBD" — поле ещё не сведено со схемой instance.schema.yaml (предложение — в комментарии).
# Нотация итератора (правило): на группе from = коллекция с "[]"; на поле from = "<singular>.path"
#   (subdivisions[]→subdivision.*, programs[]→program.*, teachers[]→teacher.*);
#   собственные под-списки поля сохраняют свой "[]" (напр. program.docs.rpd[]).
# a11y: "copy" — версия для слабовидящих; в v9.0.0 присутствует в каждой таблице,
#   но срок требования оговорён до 01.09.2025 (стр.19) — помечено в комментариях.

common:                                   # ✅ Табл. 3.2.1, п.3.2
  url: "/sveden/common"
  a11y: "copy"            # Табл.3.2.1, стр.1; срок требования copy — до 01.09.2025
