education:                                # ✅ Табл. 3.5.1, п.3.5 — 4 главных тега + 4 эл.документа
  url: "/sveden/education"
  a11y: "copy"            # Табл.3.5.1, стр.1; срок требования copy — до 01.09.2025
  status: "verified"
  source: "Метод.рек. v9.0.0, Табл.3.5.1"
  fields:                                 # одиночные эл.документы без главного тега
    languageEl:   { itemprop: "languageEl",   from: "TBD" }   # docs.languages (ЭД — языки обучения)
    eduChislenEl: { itemprop: "eduChislenEl", from: "TBD" }   # docs.chislennost (ЭД — численность обучающихся)
    eduPriemEl:   { itemprop: "eduPriemEl",   from: "TBD" }   # docs.priem_results (ЭД — результаты приёма)
    eduPerevodEl: { itemprop: "eduPerevodEl", from: "TBD" }   # docs.perevod_results (ЭД — перевод/восстановление/отчисление)
    # ПРИМЕЧАНИЕ: accreditationDocLink (определён в common, Табл.3.2.1) с 01.09.2025 размещается на этой странице (стр.16), но как атрибут принадлежит common
  groups:
    eduAccred:                            # реализуемые уровни/формы/сроки
      itemprop: "eduAccred"
      from: "programs[]"
      fields:
        eduCode:      { itemprop: "eduCode",      from: "TBD" }            # program.code
        eduName:      { itemprop: "eduName",      from: "program.title" }
        eduProf:      { itemprop: "eduProf",      from: "TBD" }            # program.profile
        eduLevel:     { itemprop: "eduLevel",     from: "program.type" }
        eduForm:      { itemprop: "eduForm",      from: "program.form" }
        learningTerm: { itemprop: "learningTerm", from: "program.term" }   # нормативный срок (для ДПП — объём/срок)
        eduPred:      { itemprop: "eduPred",      from: "TBD" }            # program.subjects (предметы/курсы/дисциплины)
        eduPrac:      { itemprop: "eduPrac",      from: "TBD" }            # program.practices
    eduOp:                                # по каждой ОП, в т.ч. адаптированной (отдельного eduAdOp в v9.0.0 нет)
      itemprop: "eduOp"
      from: "programs[]"
      fields:
        eduCode:          { itemprop: "eduCode",          from: "TBD" }            # program.code
        eduName:          { itemprop: "eduName",          from: "program.title" }
        eduLevel:         { itemprop: "eduLevel",         from: "program.type" }
        eduProf:          { itemprop: "eduProf",          from: "TBD" }            # program.profile
        eduForm:          { itemprop: "eduForm",          from: "program.form" }
        opMain:           { itemprop: "opMain",           from: "TBD" }            # program.docs.op_main (ЭД)
        educationPlan:    { itemprop: "educationPlan",    from: "TBD" }            # program.docs.plan (ЭД)
        educationRpd:     { itemprop: "educationRpd",     from: "TBD" }            # program.docs.rpd[] (ЭД, по каждой дисциплине — список)
        educationShedule: { itemprop: "educationShedule", from: "TBD" }            # program.docs.schedule (ЭД; sic — «Shedule» из источника)
        eduPr:            { itemprop: "eduPr",            from: "TBD" }            # program.docs.practice_programs (ЭД)
        methodology:      { itemprop: "methodology",      from: "TBD" }            # program.docs.methodology (ЭД + раб. программы воспитания)
    eduNir:                               # научная деятельность (для ВО и ДПО)
      itemprop: "eduNir"
      from: "programs[]"
      fields:
        eduCode:     { itemprop: "eduCode",     from: "TBD" }            # program.code
        eduName:     { itemprop: "eduName",     from: "program.title" }
        perechenNir: { itemprop: "perechenNir", from: "TBD" }            # program.nir.directions
        eduProf:     { itemprop: "eduProf",     from: "TBD" }            # program.profile
        eduLevel:    { itemprop: "eduLevel",    from: "program.type" }
        resultNir:   { itemprop: "resultNir",   from: "TBD" }            # program.nir.results
        baseNir:     { itemprop: "baseNir",     from: "TBD" }            # program.nir.base
        napravNir:   { itemprop: "napravNir",   from: "TBD" }            # program.nir.school (пример стр.48; в Табл.3.5.1 нет — опциональный)
    graduateJob:                          # трудоустройство выпускников
      itemprop: "graduateJob"
      from: "programs[]"
      fields:
        eduCode: { itemprop: "eduCode", from: "TBD" }            # program.code
        eduName: { itemprop: "eduName", from: "program.title" }
        eduProf: { itemprop: "eduProf", from: "TBD" }            # program.profile
        v1:      { itemprop: "v1",      from: "TBD" }            # program.graduates.total (выпускников прошлого года)
        t1:      { itemprop: "t1",      from: "TBD" }            # program.graduates.employed (трудоустроено)

