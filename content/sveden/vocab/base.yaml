  source: "Метод.рек. v9.0.0, Табл.3.2.1"
  fields:
    fullName:   { itemprop: "fullName",   from: "org.full_name" }
    shortName:  { itemprop: "shortName",  from: "org.short_name" }
    regDate:    { itemprop: "regDate",    from: "org.registered" }
    address:    { itemprop: "address",    from: "org.address.legal" }
    workTime:   { itemprop: "workTime",   from: "org.work_time" }
    telephone:  { itemprop: "telephone",  from: "org.contacts.phone" }
    email:      { itemprop: "email",      from: "org.contacts.email" }
    licenseDocLink:       { itemprop: "licenseDocLink",       from: "org.license.link" }
    accreditationDocLink: { itemprop: "accreditationDocLink", from: "TBD" }   # org.accreditation.link; с 01.09.2025 каноническое место — /education (стр.16)
    addressPlaceDop:  { itemprop: "addressPlaceDop",  from: "org.address.legal", note: "место по ДО/ДПО; при онлайн — адрес ОО" }
    addressPlaceSet:  { itemprop: "addressPlaceSet",  from: "TBD" }   # org.places.network[]  (сетевая форма)
    addressPlacePrac: { itemprop: "addressPlacePrac", from: "TBD" }   # org.places.practice[] (места практики)
    addressPlacePodg: { itemprop: "addressPlacePodg", from: "TBD" }   # org.places.podg[]     (практическая подготовка)
    addressPlaceGia:  { itemprop: "addressPlaceGia",  from: "TBD" }   # org.places.gia[]      (ГИА)
    addressPlaceOppo: { itemprop: "addressPlaceOppo", from: "TBD" }   # org.places.oppo[]     (осн. программы проф. обучения)
  groups:
    uchredLaw:                            # главный тег — на каждого учредителя
      itemprop: "uchredLaw"
      from: "org.founders[]"
      fields:
        nameUchred:    { itemprop: "nameUchred",    from: "founder.name" }
        addressUchred: { itemprop: "addressUchred", from: "founder.address" }
        telUchred:     { itemprop: "telUchred",     from: "founder.phone" }
        mailUchred:    { itemprop: "mailUchred",    from: "founder.email" }
        websiteUchred: { itemprop: "websiteUchred", from: "founder.site" }

