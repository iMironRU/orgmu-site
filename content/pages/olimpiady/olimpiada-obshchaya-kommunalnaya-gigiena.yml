# Источник: информационное письмо кафедры общей гигиены ОрГМУ
# (файл письма — в public/files/olimpiady/, ссылка в блоке «Документы»).

slug: olimpiada-obshchaya-kommunalnaya-gigiena
title: Предметная олимпиада «Основы общей и коммунальной гигиены»
breadcrumb: { label: Олимпиады, href: /olimpiady }
group: Предметные олимпиады для студентов ОрГМУ
order: 1
lead: Кафедра общей гигиены приглашает принять участие в предметной олимпиаде «Основы общей и коммунальной гигиены» среди обучающихся 5 курса медико-профилактического факультета.
help:
  title: Вопросы по участию
  text: Кудусова Луиза Халимовна, старший преподаватель кафедры общей гигиены
  linkLabel: salihova.luiza@bk.ru
  href: "mailto:salihova.luiza@bk.ru"

blocks:
  - type: h2
    text: Когда и где
  - type: table
    head: [Параметр, Значение]
    rows:
      - ["Дата проведения", "24 апреля 2026 года"]
      - ["Формат проведения", "Очный"]
      - ["Место проведения", "г. Оренбург, ш. Шарлыкское, 5, кафедра общей гигиены"]
      - ["Участники", "Обучающиеся 5 курса медико-профилактического факультета"]
      - ["Организатор", "Кафедра общей гигиены"]
  - type: text
    text: Целями олимпиады является повышение мотивации студентов, развитие их учебно-познавательной активности и творческих способностей, реализация научно-исследовательского потенциала студентов и формирование профессиональных компетенций.

  - type: h2
    text: Порядок проведения
  - type: callout
    text: Условие участия — каждый участник должен пройти последовательно все этапы олимпиады, включающие проверку теоретических знаний и приобретённых умений в строго отведённое на каждое задание и этап время.
  - type: table
    head: [Этап, Содержание, Кто проходит дальше]
    rows:
      - ["Этап 1. Тестирование", "Индивидуальное решение 20 тестовых заданий, сформированных методом случайной выборки из общего банка (300 вопросов)", "10 обучающихся с наиболее высокими результатами"]
      - ["Этап 2. Интеллектуальный турнир «Брейн-ринг»", "Коллективно-состязательный модуль по актуальным разделам коммунальной гигиены", "3 финалиста, набравшие максимум баллов за быстроту и точность ответов"]
      - ["Этап 3. Интеллектуальный марафон (финал)", "Многоуровневое испытание: решение 5 профильных ситуационных задач, распределённых по степени сложности (система «цветных дорожек»)", "Победитель и призёры"]

  - type: h2
    text: Определение победителей и бонусные баллы
  - type: text
    text: Итоговый результат каждого участника формируется путём суммирования баллов, полученных на всех трёх этапах состязания. Победители и призёры определяются на основании итогового рейтинга по сумме набранных баллов.
  - type: text
    text: "Согласно приказу № 479 от 03.03.2020 «Об утверждении и введении в действие версии № 3 Положения П 004.03-2020 „О балльно-рейтинговой системе оценивания учебных достижений обучающихся“» студентам начисляются бонусные баллы:"
  - type: list
    items:
      - 1 место — 3 балла
      - 2 и 3 место — 2 балла
  - type: text
    text: Полученные по итогам предметной олимпиады бонусные баллы суммируются с текущим рейтингом и учитываются при выставлении дисциплинарного рейтинга.

  - type: h2
    text: Литература для подготовки
  - type: list
    items:
      - "Мельниченко П. И., Архангельский В. И., Козлова Т. А. Гигиена. — 2-е изд., испр. и доп. — М.: ГЭОТАР-Медиа, 2022. — 656 с. ISBN 978-5-9704-6597-4. ЭБС «Консультант студента» (по подписке)"
      - "Архангельский В. И., Кириллов В. Ф. Гигиена и экология человека: учебник. — М.: ГЭОТАР-Медиа, 2023. — 176 с. ISBN 978-5-9704-7698-7. ЭБС «Консультант студента» (по подписке)"
      - "Шлепнина Т. Г., Кирпиченкова Е. В. Коммунальная гигиена: электронный учебник. — ГЭОТАР-Медиа, 2023. — 752 с."
      - "Мазаев В. Т., Шлепнина Т. Г. Коммунальная гигиена: электронный учебник. — ГЭОТАР-Медиа, 2014. — 704 с."
      - "Кирпиченкова Е. В. Коммунальная гигиена: руководство к практическим занятиям: учебное пособие. — ГЭОТАР-Медиа, 2023. — 328 с."
      - "Мазаев В. Т., Шлепнина Т. Г. Коммунальная гигиена: учебник / под ред. В. Т. Мазаева. — М.: ГЭОТАР-Медиа, 2014. — 704 с."
      - "Санитарная охрана водных объектов: учебное пособие для студентов / Л. А. Бархатова, В. М. Боев, Е. Л. Борщук [и др.]; под ред. В. М. Боева. — Оренбург: Изд-во ОрГМА, 2013. — 120 с."
      - "Гигиенические требования к организациям, осуществляющим медицинскую деятельность: учебное пособие / Л. А. Бархатова [и др.]; под ред. В. М. Боева. — Оренбург: Изд-во ОрГМУ, 2015. — 156 с."

