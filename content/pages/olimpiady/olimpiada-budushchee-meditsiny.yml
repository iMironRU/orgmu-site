slug: olimpiada-budushchee-meditsiny
title: Всероссийская олимпиада школьников «Будущее медицины»
breadcrumb: { label: Олимпиады, href: /olimpiady }
group: Для школьников и студентов колледжей
order: 2
lead: Олимпиада выявляет и развивает интерес к медицине, формирует у школьников стимулы к приобретению знаний по фундаментальным дисциплинам и помогает выявить одарённых и талантливых ребят. Участие бесплатное.
help:
  title: Нужна помощь?
  text: Отдел довузовского образования
  linkLabel: 8 (3532) 50-06-06, доб. 305
  href: "tel:+73532500606,305"

blocks:
  - type: callout
    text: "Олимпиада 2026 года завершена. Список победителей и призёров опубликован — файл ниже. Сертификаты участников очного этапа размещены на Яндекс-Диске: нужно выбрать вуз, в котором проходил очный этап. Торжественная церемония награждения проходит на площадках вузов-организаторов, каждый вуз связывается с победителями и призёрами."

  - type: h2
    text: Баллы к ЕГЭ
  - type: text
    text: Победителям и призёрам олимпиады (выпускникам 11-х классов общеобразовательных организаций) начисляются дополнительные баллы за индивидуальные достижения при поступлении.
  - type: list
    items:
      - 5 баллов — за 1 место
      - 4 балла — за 2 и 3 места
      - 1 балл — участнику второго очного этапа, набравшему на этом этапе ненулевое количество баллов по каждому из предметов
  - type: text
    text: Информацию о количестве баллов и условиях их действия можно найти на сайтах вузов-организаторов.

  - type: h2
    text: Этапы
  - type: text
    text: Олимпиада состоит из двух этапов — первого дистанционного и второго очного. Очный этап проходит на площадках вузов-организаторов.

