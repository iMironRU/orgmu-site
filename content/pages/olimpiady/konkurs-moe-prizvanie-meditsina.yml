slug: konkurs-moe-prizvanie-meditsina
title: Творческий конкурс «Моё призвание — медицина»
breadcrumb: { label: Олимпиады, href: /olimpiady }
group: Для школьников и студентов колледжей
order: 3
lead: Школьников 7–9 классов приглашаем принять участие в творческом конкурсе «Моё призвание — медицина».
help:
  title: Нужна помощь?
  text: Отдел довузовского образования
  linkLabel: 8 (3532) 50-06-06, доб. 305
  href: "tel:+73532500606,305"

blocks:
  - type: h2
    text: Направления работ
  - type: text
    text: "В конкурсе принимают участие индивидуальные творческие работы по следующим направлениям:"
  - type: list
    items:
      - "Творческая работа в формате эссе (прозаическое сочинение) — впечатления и умозаключения автора на выбранную тему, например «Почему я хочу стать врачом»"
      - "Творческая работа в формате креативной поделки по химии и/или биологии с общим названием «Ненаглядные пособия»"

  - type: h2
    text: Сроки проведения
  - type: table
    head: [Этап, Сроки]
    rows:
      - ["Приём творческих работ", "17 ноября — 22 декабря 2025"]
      - ["Экспертиза творческих работ", "22 декабря 2025 — 22 января 2026"]
      - ["Публикация результатов на сайте и в соцсетях университета", "до 7 февраля 2026"]
      - ["Подведение итогов, награждение победителей и призёров", "14 февраля 2026, 12:00"]
  - type: text
    text: "Подведение итогов конкурса проходит по адресу: г. Оренбург, ФГБОУ ВО ОрГМУ Минздрава России, пр. Парковый, 7."

  - type: h2
    text: Как подать работу
  - type: text
    text: "Участник предоставляет пакет документов в бумажном варианте лично или почтой России: г. Оренбург, ФГБОУ ВО ОрГМУ Минздрава России, пр. Парковый, 7."

