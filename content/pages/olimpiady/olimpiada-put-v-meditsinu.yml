slug: olimpiada-put-v-meditsinu
title: Олимпиада исследовательских работ «Путь в медицину»
breadcrumb: { label: Олимпиады, href: /olimpiady }
lead: Школьников с 1 по 11 класс и учащихся СПО приглашаем участвовать в олимпиаде исследовательских работ «Путь в медицину». Участие бесплатное, необходима предварительная регистрация.
help:
  title: Нужна помощь?
  text: Отдел довузовского образования
  linkLabel: 8 (3532) 50-06-06, доб. 305
  href: "tel:+73532500606,305"

blocks:
  - type: callout
    text: "XIV олимпиада (2025–2026) завершена. Списки победителей и призёров опубликованы — файл ниже. Сертификаты участникам 2 этапа направлены на электронную почту, указанную в заявке."

  - type: h2
    text: Кто может участвовать
  - type: list
    items:
      - I возрастная группа — 1–4 классы
      - II возрастная группа — 5–7 классы
      - III возрастная группа — 8–9 классы
      - IV возрастная группа — 10–11 классы / 1–4 курсы учреждений СПО

  - type: h2
    text: Баллы к ЕГЭ
  - type: text
    text: Победителям и призёрам олимпиады (выпускникам 11-х классов общеобразовательных организаций и выпускникам учреждений СПО) начисляются дополнительные баллы за индивидуальные достижения при поступлении в ОрГМУ.
  - type: list
    items:
      - 5 баллов — за 1 место
      - 4 балла — за 2 и 3 места

  - type: h2
    text: Секции
  - type: text
    text: "В олимпиаде принимают участие индивидуальные исследовательские работы медицинской направленности по секциям:"
  - type: list
    items:
      - Биология — «Медико-биологические проблемы»
      - Биология — «Человек и его здоровье»
      - Биология — «Оренбургская фауна и флора на службе здоровья человека»
      - Биология — «Юные исследователи»
      - Химия — «Химия и организм человека»
      - Химия — «Химия в домашней аптечке»
      - Химия — «Юные исследователи»
      - Психология — «Психология здоровья»
  - type: text
    text: Названия секций могут варьироваться оргкомитетом в зависимости от количества и направлений заявленных работ. К участию не допускаются работы, представленные на любом другом конкурсе или олимпиаде, независимо от года участия.

  - type: h2
    text: Этапы и сроки
  - type: table
    head: [Этап, Сроки, Что нужно сделать]
    rows:
      - ["I этап — отборочный (заочный)", "12 января — 3 марта 2026", "Подача заявки, исследовательской работы, согласия на обработку и публикацию персональных данных, презентации"]
      - ["II этап — заключительный (очный)", "25 апреля 2026", "Защита исследовательской работы с использованием презентации, по секциям"]
  - type: text
    text: "График II заключительного (очного) этапа: 25 апреля 2026 года, 9:00–10:00 по местному времени — регистрация участников. Для регистрации необходимо предъявить документ, удостоверяющий личность."

  - type: h2
    text: Как подать работу
  - type: text
    text: "Для участия в I отборочном (заочном) этапе участник предоставляет пакет документов в электронном виде на адрес электронной почты отдела и в бумажном виде — лично или почтой России: г. Оренбург, ФГБОУ ВО ОрГМУ Минздрава России, пр. Парковый, 7, III учебный корпус, 3 этаж."
  - type: callout
    text: "Для отправки материалов в электронном виде: 1) в теме письма указать «XIV Олимпиада исследовательских работ „Путь в медицину“»; 2) файлы назвать по фамилии участника, например: иванова_заявка, иванова_работа, иванова_презентация. Работы, присланные на олимпиаду, не возвращаются."

