  - type: h2
    text: Частые вопросы
  - type: faq
    items:
      - q: Участие платное?
        a: Нет, олимпиада проводится бесплатно. Необходима предварительная регистрация по форме.
      - q: Дают ли баллы к ЕГЭ?
        a: "Да. Победителям и призёрам — выпускникам 11-х классов и выпускникам учреждений СПО — начисляются дополнительные баллы за индивидуальные достижения при поступлении в ОрГМУ: 5 баллов за 1 место, 4 балла за 2 и 3 места."
      - q: Не пришёл сертификат участника — что делать?
        a: Сертификат участника направляется на электронную почту, указанную в заявке. Если его нет, обратитесь в отдел довузовского образования по телефону 8 (3532) 50-06-06, доб. 305.
      - q: Можно ли подать работу, которая уже участвовала в другом конкурсе?
        a: Нет. К участию не допускаются конкурсные работы, представленные на любом другом конкурсе или олимпиаде, независимо от года участия.
