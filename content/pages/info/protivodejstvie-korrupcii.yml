slug: protivodejstvie-korrupcii
title: Противодействие коррупции
toc:
  title: Содержание
  numbered: true
lead: Раздел ведётся в соответствии с Федеральным законом от 25.12.2008 № 273-ФЗ «О противодействии коррупции». Здесь публикуются нормативные акты, локальные документы университета, формы для заполнения, сведения о доходах и канал для сообщений о фактах коррупции.
blocks:
  - type: h2
    text: Общие положения
  - type: text
    text: 'Противодействие коррупции в ФГБОУ ВО ОрГМУ Минздрава России ведётся по трём направлениям: профилактика, выявление и пресечение коррупционных правонарушений, минимизация и ликвидация их последствий.'
  - type: callout
    text: Файлы ниже размещены на сайте университета orgma.ru — ссылки ведут на них напрямую.
