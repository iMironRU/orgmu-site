  - type: h2
    text: Порядок проведения личного приёма
  - type: list
    items:
      - При личном приёме гражданин предъявляет документ, удостоверяющий личность
      - Граждане приглашаются на приём в заранее назначенное время
      - Должностные лица вправе уточнить мотивы обращения и существо вопроса, а также ознакомиться с подтверждающими документами
      - Должностные лица вправе привлекать в качестве экспертов сотрудников профильных структурных подразделений
      - С согласия гражданина ответ может быть дан устно в ходе приёма — об этом делается запись в карточке личного приёма
      - На личном приёме гражданин вправе подать письменное обращение и получить на него ответ в установленные сроки
      - На обращениях, принятых на личном приёме, указывается дата и делается отметка «принято на личном приёме»
      - Если решение вопроса не входит в компетенцию университета, гражданину разъясняется, куда следует обратиться
      - В рассмотрении обращения может быть отказано, если ранее по существу поставленных вопросов уже был дан ответ

