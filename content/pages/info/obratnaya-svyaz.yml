  - type: h2
    text: Частые вопросы
  - type: faq
    items:
      - q: В какой срок ответят на обращение?
        a: 30 дней со дня регистрации обращения (Федеральный закон № 59-ФЗ). Если для ответа нужен запрос в другие организации, срок может быть продлён не более чем на 30 дней — об этом заявителя уведомляют.
      - q: Как узнать, что обращение зарегистрировано?
        a: "По телефонам информирования о факте регистрации обращений: 8 (3532) 500-606, доб. 638, 639, 640."
      - q: Нужно ли записываться на личный приём?
        a: Да, личный приём руководством университета ведётся по предварительной записи. При записи уточняются ФИО, контактные данные и суть вопроса. На приём нужно взять документ, удостоверяющий личность.
      - q: К кому идти на приём — к ректору или проректору?
        a: Проректоры и главный врач клиники ведут приём по направлениям своей деятельности. Ректор рассматривает аргументированные жалобы на решения, ранее принятые на личном приёме проректорами.
