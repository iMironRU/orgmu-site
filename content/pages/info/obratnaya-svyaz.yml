# и действующая форма обратной связи на Яндекс.Формах.
# Таблица личного приёма — заготовка: график на orgma не опубликован.

slug: obratnaya-svyaz
title: Обратная связь
toc: { title: Содержание, numbered: true }
lead: Обращения граждан рассматриваются в порядке, установленном Федеральным законом от 02.05.2006 № 59-ФЗ «О порядке рассмотрения обращений граждан Российской Федерации».
help:
  title: Приёмная университета
  text: Пн–Пт, приём обращений
  linkLabel: 8 (3532) 50-06-20
  href: "tel:+73532500620"

blocks:
  - type: h2
    text: Порядок рассмотрения обращений
  - type: list
    items:
      - Обращение регистрируется в течение трёх дней с момента поступления
      - Срок рассмотрения — 30 дней со дня регистрации
      - Если требуется запрос в другие организации, срок может быть продлён не более чем на 30 дней с уведомлением заявителя
      - Ответ направляется по адресу, указанному в обращении
  - type: callout
    text: Анонимные обращения, не содержащие фамилии и почтового или электронного адреса заявителя, не рассматриваются. Обращение не рассматривается по существу, если в нём содержатся нецензурные выражения или угрозы.
  - type: files
    items:
      - name: Порядок приёма и рассмотрения обращений
        href: https://www.orgma.ru/ru/akademiya/poryadok-priema-i-rassmotreniya-obrashchenij

  - type: h2
    text: Форма обращения
  - type: form
    submitLabel: Отправить обращение
    note: "Отправка с этого сайта пока не подключена. Действующая форма обратной связи университета —"
    noteLink:
      label: официальная форма ОрГМУ →
      href: https://forms.yandex.ru/cloud/62f9e59b816856044ec8db9a/
    fields:
      - label: Тема обращения
        kind: select
        required: true
        options:
          - Приём и поступление
          - Обучение и расписание
          - Общежитие
          - Платные услуги
          - Работа в университете
          - Другое
      - { label: ФИО, kind: text, required: true }
      - { label: Электронная почта, kind: email, required: true, hint: На этот адрес будет направлен ответ }
      - { label: Сообщение, kind: textarea, required: true }
      - { label: Согласен на обработку персональных данных, kind: checkbox, required: true }

  - type: h2
    text: Личный приём граждан
  - type: table
    head: [Должностное лицо, Дни приёма, Время, Место]
    rows:
      - ["—", "—", "—", "—"]
  - type: text
    text: График личного приёма заполняется по мере публикации университетом.

  - type: h2
    text: Реквизиты для письменных обращений
  - type: table
    head: [Параметр, Значение]
    rows:
      - ["Почтовый адрес", "460000, г. Оренбург, ул. Советская, д. 6"]
      - ["Телефон", "8 (3532) 50-06-20"]
      - ["Электронная почта", "office@orgma.ru"]
      - ["Приёмная комиссия", "8 (3532) 50-06-03"]

  - type: h2
    text: Частые вопросы
  - type: faq
    items:
      - q: В какой срок ответят на обращение?
        a: 30 дней со дня регистрации обращения. Если для ответа нужен запрос в другие организации, срок может быть продлён не более чем на 30 дней — об этом заявителя уведомляют.
      - q: Рассматриваются ли анонимные обращения?
        a: Нет. Если в обращении не указаны фамилия и почтовый или электронный адрес для ответа, оно не рассматривается.
      - q: Можно ли подать обращение лично?
        a: Да, по адресу 460000, г. Оренбург, ул. Советская, д. 6. График личного приёма публикуется в разделе «Личный приём граждан».
