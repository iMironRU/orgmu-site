# ВНИМАНИЕ: на orgma.ru раздела закупок НЕТ — проверено (/ru/zakupki и /zakupki
# отдают 404). Поэтому страница — ЗАГОТОВКА: структура по макету, данные
# прочерками. Заполняет контрактная служба.
