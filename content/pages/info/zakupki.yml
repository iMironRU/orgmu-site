# Актуальные извещения в любом случае публикуются в ЕИС (zakupki.gov.ru) —
# ссылку на карточку организации подставить в раздел «Правовые основания».

slug: zakupki
title: Закупки
toc: { title: Содержание, numbered: true }
lead: Закупки товаров, работ и услуг для нужд университета проводятся в соответствии с законодательством о контрактной системе. Сведения о закупках публикуются в единой информационной системе.
help:
  title: Контрактная служба
  text: По вопросам закупок
  linkLabel: 8 (3532) 50-06-20
  href: "tel:+73532500620"

blocks:
  - type: h2
    text: Правовые основания
  - type: list
    items:
      - Федеральный закон от 05.04.2013 № 44-ФЗ «О контрактной системе в сфере закупок товаров, работ, услуг для обеспечения государственных и муниципальных нужд»
      - Федеральный закон от 18.07.2011 № 223-ФЗ «О закупках товаров, работ, услуг отдельными видами юридических лиц»
  - type: callout
    text: Официальные сведения о закупках университета — извещения, документация, протоколы, планы-графики — публикуются в единой информационной системе в сфере закупок (ЕИС) на сайте zakupki.gov.ru. Ссылку на карточку организации в ЕИС нужно подставить сюда.

