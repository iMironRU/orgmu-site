slug: dissovet
title: Диссертационные советы
toc:
  numbered: true
lead: В университете действуют три диссертационных совета. Совет принимает диссертацию к предварительному рассмотрению и последующей защите при наличии полного пакета документов по перечню, установленному Минобрнауки России.
help:
  title: Отдел диссертационных исследований
  text: Лопина Ирина Валерьевна, начальник отдела
  linkLabel: 8 (3532) 50-06-06, доб. 645
  href: "tel:+73532500606,645"
blocks:
  - type: h2
    text: Общие сведения
  - type: text
    text: Диссертационные советы созданы на базе ФГБОУ ВО ОрГМУ Минздрава России и проводят защиту диссертаций на соискание учёной степени кандидата и доктора наук по закреплённым за ними специальностям.
  - type: callout
    text: Диссертационный совет принимает диссертацию к предварительному рассмотрению и последующей защите при наличии документов по перечню, устанавливаемому Минобрнауки России. Перечень и образцы — в разделе «Документы соискателя».
