slug: nok
title: Независимая оценка качества условий оказания услуг
toc: { title: Содержание, numbered: true }
lead: Независимая оценка качества условий оказания услуг (НОК) — форма общественного контроля, которая проводится для повышения качества работы организации и информирования граждан.

blocks:
  - type: h2
    text: Что такое НОК
  - type: text
    text: Независимая оценка качества условий оказания услуг проводится в соответствии с законодательством Российской Федерации. Оценка позволяет гражданам оценить условия оказания услуг и учитывается организацией при планировании работы.
  - type: list
    items:
      - Открытость и доступность информации об организации
      - Комфортность условий предоставления услуг
      - Доступность услуг для инвалидов
      - Доброжелательность и вежливость работников
      - Удовлетворённость условиями оказания услуг
  - type: callout
    text: Официальные результаты независимой оценки качества публикуются на официальном сайте для размещения информации о государственных и муниципальных учреждениях bus.gov.ru. Ссылку на карточку организации нужно подставить сюда.
  - type: files
    items:
