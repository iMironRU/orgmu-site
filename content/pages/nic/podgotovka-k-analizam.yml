slug: podgotovka-k-analizam
title: Подготовка к анализам
toc:
  numbered: true
breadcrumb:
  href: /nic
  label: Научно-исследовательский центр
lead: Как подготовиться к сдаче биологического материала, чтобы результат был достоверным.
blocks:
- type: h2
  text: Общие правила
- type: text
  text: Уважаемые пациенты, ниже представлены рекомендации для подготовки к отдельным видам лаболаторных
    исследований. Соблюдение рекомендаций положительно влияет на точность и достоверность результата
- type: h2
  text: Адреналин и норадреналин
- type: text
  text: 'За 8 дней до исследования исключить лекарственные препараты: салицилаты, β-блокаторы. За 1 день
    до исследования необходимо воздержаться от тяжелой физической нагрузки, исключить алкоголь, кофе,
    чай, витамины группы В, бананы'
- type: h2
  text: АКТГ, кортизол
- type: text
  text: В связи с тем, что АКТГ и кортизол являются гормонами стресса, перед процедурой сдачи крови необходимо
    в течение 20 минут успокоиться и расслабиться. Любой стресс вызывает немотивированный выброс этих
    гормонов в кровь, что повлечет увеличение данного показателя
- type: text
  text: Уровень этих гормонов циклически изменяется в течение суток, поэтому наиболее информативны результаты
    исследований, проведенных утром до 9 часов
- type: h2
  text: Альдостерон
- type: text
  text: По согласованию с врачом за 8 дней до исследования отменить гипотензивные средства, β-блокаторы,
    слабительные, кортикостероиды, диуретики, антидепрессанты. За 3 недели до исследования отменить антагонисты
    альдостерона
- type: h2
  text: Альфа-2-макроглобулин
- type: text
  text: В течение трех дней перед исследованием необходимо воздержание от употребления в пищу мяса
- type: h2
  text: Антимюллеров гормон (AMH/MIS), Ингибин B
- type: text
  text: Женщинам исследование проводят на 3-5 день менструального цикла. За 3 дня до взятия крови исключить
    интенсивные спортивные тренировки. Исследование не следует проводить во время любых острых заболеваний.
    За 1 час до взятия крови не курить
- type: h2
  text: Гаптоглобин
- type: text
  text: 'Перед исследованием необходимо исключить прием следующих препаратов: дапсона, метилдопы, сульфасалазина,
    эстрогенов, пероральных контрацептивов, тамоксифена, андрогенов'
- type: h2
  text: Гастрин-17, Гастрин-17 стимулированный, пепсиноген I, пепсиноген II, H. Pylori IgG
- type: text
  text: Кровь на исследование необходимо сдавать строго натощак после 12-часового голодания
- type: text
  text: 'За 1 неделю до проведения исследования воздержаться от приема лекарственных средств, влияющих
    на желудочную секрецию: Pepcedin, Zantac, Nizax, Ranimex, Esofex, Losec, Somac, Ranixal, Ranil'
- type: text
  text: 'За 1 день до проведения исследования воздержаться от приема медикаментов, нейтрализующих соляную
    кислоту, секретируемую желудком: Alsucral, Balancid, Prepulsid, Metropam, Librax, Gaviscon'
- type: text
  text: Если возникают трудности с отменой лекарств, обязательно сообщить об этом лечащему врачу
- type: text
  text: За 3 часа до сдачи крови воздержаться от курения
- type: h2
  text: Глюкоза
- type: text
  text: При сдаче крови на глюкозу (в дополнение к основным требованиям подготовки к анализам) нельзя
    чистить зубы и жевать резинку, пить чай/кофе (даже несладкий). Утренняя чашка кофе кардинально изменит
    показатели. Также влияние оказывают контрацептивы, мочегонные средства и другие лекарства
- type: h2
  text: Глюкозотолерантный тест
- type: text
  text: Проводится только при наличии предварительных результатов определения глюкозы натощак, без нагрузки.
    Содержание глюкозы в плазме крови определяют натощак и через 2 часа после нагрузки глюкозой
- type: text
  text: Необходимо в течение трех дней до исследования соблюдать обычный режим питания (с содержанием
    углеводов более 125-150 г в сутки) и придерживаться привычных физических нагрузок
- type: text
  text: Исследование проводится утром натощак после ночного голодания в течение 12-16 часов (в это время
    нельзя курить и употреблять алкоголь)
- type: text
  text: Во время проведения исследования пациент должен спокойно лежать или сидеть, не курить, не переохлаждаться
    и не заниматься физической работой
- type: text
  text: Не рекомендуется проводить исследование после и во время стрессовых воздействий, после операций
    и родов, при воспалительных процессах, алкогольном циррозе печени, гепатитах, во время менструаций,
    при заболеваниях ЖКТ с нарушением всасывания глюкозы
- type: text
  text: Перед проведением теста необходимо исключить лечебные процедуры и прием лекарств (адреналина,
    глюкокортикоидов, контрацептивов, кофеина, мочегонных тиазидного ряда, психотропных средств и антидепрессантов)
- type: text
  text: Отмена лекарственных препаратов производится только после предварительной консультации пациента
    с врачом
- type: text
  text: Детям до 14 лет глюкозотолерантный тест не выполняется
- type: text
  text: Беременным глюкозотолерантный тест рекомендуется проводить на сроке 24-28 недель, это позволяет
    выявить с точностью до 98% женщин с гестационным диабетом
- type: h2
  text: Гормональные исследования
- type: text
  text: Кровь на гормональные исследования необходимо сдавать натощак в утренние часы, в период с 8 до
    11 часов утра. При отсутствии такой возможности, на некоторые гормоны кровь можно сдавать спустя 4-5
    часов после последнего приема пищи в дневные/вечерние часы (кроме тех исследований, на которые кровь
    необходимо сдавать строго в утренние часы). Перед сдачей анализов необходимо проконсультироваться
    у врача специалиста
- type: text
  text: За 1-2 дня до сдачи анализов исключить из рациона продукты с высоким содержанием жиров, последний
    прием пищи не должен быть обильным. За 1 день до исследования необходим психоэмоциональный и физический
    комфорт (спокойное состояние без перегревания и переохлаждения)
- type: h2
  text: Гормоны щитовидной железы
- type: text
  text: 'При первичной проверке уровня тиреоидных гормонов отменить препараты, влияющие на функцию щитовидной
    железы за 2-4 недели до исследования (после согласования с лечащим врачом). При контроле лечения исключить
    прием препаратов в день исследования и обязательно отметить это в направительном бланке (отметить
    также и информацию о приеме других лекарств: аспирина, транквилизаторов, кортикостероидов, пероральных
    контрацептивов)'
- type: h2
  text: Инсулин, С-пептид
- type: text
  text: Кровь сдавать строго в утренние часы
- type: h2
  text: Исследования крови на наличие инфекций
- type: text
  text: За 1-2 дня до исследования исключить из рациона продукты с высоким содержанием жиров. За 2 дня
    до сдачи крови на вирусные гепатиты исключить из рациона цитрусовые, оранжевые фрукты и овощи
- type: text
  text: Результаты исследований на наличие инфекций зависят от периода инфицирования и состояния иммунной
    системы, поэтому отрицательный результат полностью не исключает инфекции. На раннем этапе заболевания
    происходит сероконверсия (отсутствие антител в острый период заболевания)
- type: text
  text: В сомнительных случаях целесообразно провести повторный анализ спустя 3-5 дней
- type: text
  text: Исследование крови на наличие антител класса IgМ к возбудителям инфекций следует проводить не
    ранее 5-7 дня с момента заболевания, а антител классов IgG, IgA не ранее 10-14 дня. Это связано со
    сроками выработки антител иммунной системой и появлением их в крови в диагностическом титре
- type: h2
  text: Мочевина
- type: text
  text: 'За 1-2 дня до исследования необходимо соблюдать диету: отказаться от употребления богатой пуринами
    пищи — печени, почек, а также максимально ограничить в рационе мясо, рыбу, кофе, чай. Противопоказаны
    интенсивные физические нагрузки'
- type: h2
  text: Общий анализ крови
- type: text
  text: 'Взятие крови проводится строго натощак: от момента последнего приема пищи должно пройти не менее
    8 часов. Разрешается пить воду (не минеральная, негазированная). Запрещается употреблять сок, чай,
    кофе'
- type: text
  text: За 2-3 дня до исследования не переедать, особенно жирную пищу. Исключить алкоголь, интенсивные
    физические нагрузки, не посещать сауну, баню
- type: h2
  text: Биохимия
- type: text
  text: Взятие крови проводится строго натощак от момента последнего приема пищи должно пройти не менее
    8 часов (желательно не менее 12 часов). Разрешается пить воду (не минеральная, негазированная). Запрещается
    употреблять сок, чай, кофе. За 2-3 дня до исследования не переедать, особенно жирную пищу. Исключить
    алкоголь, интенсивные физические нагрузки, не посещать сауну, баню
- type: h2
  text: Коагулограмма
- type: text
  text: 'Взятие крови проводится строго натощак: от момента последнего приема пищи должно пройти не менее
    8 часов (желательно не менее 12 часов). Разрешается пить воду (не минеральная, негазированная). Запрещается
    употреблять сок, чай, кофе. За 2-3 дня до исследования не переедать, особенно жирную пищу. Исключить
    алкоголь, интенсивные физические нагрузки, не посещать сауну, баню'
- type: h2
  text: Гормоны
- type: text
  text: 'Взятие крови проводится строго натощак: от момента последнего приема пищи должно пройти не менее
    8 часов (желательно не менее 12 часов). Разрешается пить воду (не минеральная, негазированная). Запрещается
    употреблять сок, чай, кофе. За 2-3 дня до исследования не переедать, особенно жирную пищу. Исключить
    алкоголь, интенсивные физические нагрузки, не посещать сауну, баню'
- type: text
  text: В день взятия крови исключить прием лекарств, если отмена невозможна — информировать лабораторию.
    При исследовании гормонов в динамике, желательно проводить взятие крови в одно и то же время суток.
    Некоторые гормоны, женщинам необходимо сдавать в определенные дни менструального цикла. Эту информацию
    можно уточнить у лечащего врача
- type: text
  text: Внимание!Q Взятие крови на кортизол проводится строго натощак, строго в интервале с 8:00 до 11:00
    (указывается точное время венепункции)
- type: h2
  text: Инфекции
- type: text
  text: 'Взятие крови проводится строго натощак: от момента последнего приема пищи должно пройти не менее
    8 часов (желательно не менее 12 часов). Разрешается пить воду (не минеральная, негазированная). Запрещается
    употреблять сок, чай, кофе. За 2-3 дня до исследования не переедать, особенно жирную пищу. Исключить
    алкоголь, интенсивные физические нагрузки, не посещать сауну, баню'
- type: h2
  text: Глюкозотолерантный тест
- type: text
  text: Внимание Глюкозотолерантный тест назначается только после консультации врача. Пациентам с сахарным
    диабетом 1 типа данное исследование не проводится
- type: text
  text: Взятие крови проводится утром, послеголодания:от момента последнего приема пищи должно пройти
    не менее 12-14 часов
- type: text
  text: Перед проведением глюкозотолерантного теста в течение 3-х дней соблюдать диету (не более 150 граммов
    углеводов в день), исключить интенсивные физические нагрузки, не посещать баню, сауну
- type: text
  text: За 3 дня до теста отменить тиазидные диуретики, контрацептивы и глюкокортикоиды (по согласованию
    с врачом)
- type: text
  text: Во время проведения исследования не пить воду, не курить. Повторное взятие крови проводится через
    1 час и через 2 часа после «нагрузки» глюкозой
- type: h2
  text: Подготовка к сдаче тиреотропного гормона (ТТГ)
- type: text
  text: 'Определение уровня ТТГ является наиболее чувствительным тестом для оценки функции щитовидной
    железы. При этом он остается самым часто отклоняющимся от референсного интервала среди всех гормональных
    исследований. Для получения достоверных результатов, кроме общих правил подготовки к лабораторным
    исследованиям, важно следовать приведенным ниже правилам:'
- type: text
  text: '1. Уровень ТТГ значимо изменяется в течение суток: его наибольшая концентрация определяется утренние
    часы, а минимальная – в вечерние. Следует сдавать кровь в одно и то же время, особенно в случае повторных
    исследований, так как время сдачи крови играет важную роль в интерпретации уровня ТТГ'
- type: text
  text: 2. В случае проведения заместительной терапии гормонами щитовидной железы, необходимо принимать
    препарат после взятия крови для исследования. Прием препаратов тироксина и йода за сутки до анализа
    не влияет на концентрацию ТТГ. Повторные исследования уровня ТТГ в целях контроля терапии целесообразно
    проводить не ранее, чем через 6 недель после изменения дозы или вида препарата
- type: text
  text: 3. Необходимо помнить, что результат ТТГ может быть искажен действием принимаемых лекарственных
    препаратов или продуктами их метаболизма. Перед сдачей крови на анализ следует проконсультироваться
    у лечащего врача о возможности ограничения приема лекарственных препаратов в период подготовки к исследованию.
    Рекомендуется отказ от приема лекарственных препаратов, включая БАД, перед исследованием. При невозможности
    отказа от приема лекарств, следует сообщить наименование препарата и время его последнего приема при
    сдаче крови
- type: text
  text: '4. Щитовидная железа связана с работой многих систем органов, нарушения в которых могут оказывать
    воздействие на секрецию гормона: острый и хронический стресс, острые инфекционные заболевания, нарушение
    обмена липидов и витаминов, приводящее к избытку холестерина, гомоцистеина, а также нарушение режима
    сна и бодрствование ночью, которые нарушают нормальный ритм секреции ТТГ. Влияние указанных состояний
    необходимо учитывать при интерпретации результатов, если нет возможности перенести исследование на
    более поздний срок'
- type: text
  text: 5. В разных лабораториях могут применяться разные методы исследования, поэтому для корректной
    оценки результатов исследования, необходимо проводить исследования на одной лаборатории и на одной
    и той же аналитической системе
- type: h2
  text: Витамин D*
- type: text
  text: '*Рекомендации к исследованию 35-20-010. 25-ОН Витамин D Общий (25-Гидроксикальциферол)'
- type: text
  text: 'Взятие крови проводится натощак, желательно утром. Запрещается: сок, чай, кофе. Можно пить негазированную,
    неминеральную воду. Исследование проводится не ранее, чем через 3 дня после отмены приема препаратов
    витамина D и биологически активных добавок, содержащих витамин D'
- type: h2
  text: 'Общие требования сбора мочи:'
- type: text
  text: Предпочтительно использовать утреннюю порцию мочи; при отсутствии такой возможности сбор мочи
    для исследования проводится не ранее 4-х часов после последнего мочеиспускания
- type: text
  text: Сбор мочи проводить до курса лечения антибиотиками
- type: text
  text: Накануне не употреблять красящие продукты (свекла, морковь, черника и др.), продукты с красителями,
    в том числе газированные напитки, покупные сладости
- type: text
  text: За сутки до сбора мочи не принимать лекарства (по согласованию с врачом)
- type: text
  text: За 2-3 дня исключить острую, соленую пищу, не употреблять алкоголь
- type: text
  text: В день сбора мочи не принимать мочегонные препараты
- type: text
  text: Женщинам не собирать мочу после цистоскопии, во время менструации и в течение 5–7 дней (только
    в случае срочной клинической необходимости, уведомив врача)
- type: h2
  text: Общий анализ
- type: text
  text: Перед сбором мочи провести тщательный туалет наружных половых органов. Женщинам не следует собирать
    материал во время менструации
- type: text
  text: Накануне исследования не употреблять овощи и фрукты, которые могут изменить цвет мочи (свекла,
    морковь, черника и др.)
- type: text
  text: По возможности не принимать ряд медикаментов (диуретики, витамины группы В, фурагин, аспирин и
    др.)
- type: text
  text: Внимание Сбор мочи проводится только в стерильный контейнер! Не допускается собирать мочу в емкости,
    не предназначенные для лабораторных исследований
- type: h2
  text: По Нечипоренко
- type: text
  text: Для анализа собирается первая утренняя моча (средняя порция). Перед сбором мочи провести тщательный
    туалет наружных половых органов. Женщинам не следует собирать материал во время менструации
- type: text
  text: Накануне исследования не употреблять овощи и фрукты, которые могут изменить цвет мочи (свекла,
    морковь, черника и др.)
- type: text
  text: По возможности не принимать ряд медикаментов (диуретики, витамины группы В, фурагин, аспирин и
    др.)
- type: text
  text: 'Правила сбора:'
- type: text
  text: 'Напишите на этикетке контейнера для сбора мочи ваши данные: Ф.И.О., дату рождения, дату и время
    сбора биоматериал, запись должна быть сделана разборчивым почерком'
- type: text
  text: Начните мочеиспускание и, не прерывая процесс, соберите среднюю порцию мочи в емкость
- type: text
  text: Проведите отбор пробы в вакуумную пробирку
- type: text
  text: Внимание Сбор мочи проводится только в стерильный контейнер! Не допускается собирать мочу в емкости,
    не предназначенные для лабораторных исследований
- type: h2
  text: Суточная моча
- type: text
  text: Сбор мочи проводится в течение 24 часов с соблюдением обычного питьевого режима – 1,5–2 л в сутки
- type: text
  text: Правила сбора
- type: text
  text: Утром в интервале с 6:00 до 8:00 часов освободите мочевой пузырь (эту порцию мочи вылить в унитаз)
- type: text
  text: В течение суток собирайте всю мочу в специальный контейнер объемом не менее 2 л
- type: text
  text: Последнюю порцию соберите точно в то же время, когда накануне был начат сбор (время начала и конца
    сбора отметить)
- type: text
  text: По окончании сбора суточной мочи пробу тщательно перемешайте, 15–30 раз плавно переворачивая плотно
    закрытый контейнер
- type: text
  text: Измерьте и запишите объем суточной мочи (диурез)
- type: text
  text: С помощью устройства для переноса пробы из контейнера наберите мочу в вакуумную пробирку
- type: text
  text: Пробирку промаркируйте (номер образца в соответствии с направительным бланком) и передайте в лабораторию
    с указанием общего объема выделенной за сутки мочи
- type: text
  text: Внимание. В течение всего периода сбора мочу хранить в холодильнике
- type: text
  text: 'Если для анализа требуется собрать мочу за 10–12 часов, сбор обычно проводят в ночное время:'
- type: text
  text: Перед сном опорожните мочевой пузырь и отметьте время (эту порцию мочи вылить)
- type: text
  text: Затем помочитесь через 10–12 часов в специальный контейнер, эту порцию мочи доставьте для исследований
    в лабораторию
- type: text
  text: При невозможности удержать мочеиспускание 10–12 часов, помочитесь в контейнер в несколько приемов
    и отметьте время последнего мочеиспускания
- type: text
  text: 'При необходимости сбора мочи за 2 или 3 часа:'
- type: text
  text: Опорожните мочевой пузырь (эту порцию вылить), отметьте время и ровно через 2 или 3 часа соберите
    мочу для исследования
- type: text
  text: Перед сбором суточной мочи для определения концентрации гормонов (стероидный профиль), в течение
    3-х дней до сбора мочи нельзя применять препараты, содержащие раувольфию, теофиллин, нитроглицерин,
    кофеин, этанол, хлорпромазин, контрастные красители, гидроксиметоксифенилгликоль, имипрамин, фенацетин,
    пропранолол. Также запрещается употреблять продукты, содержащие серотонин (шоколад, сыры, бананы),
    не употреблять алкоголь. Избегать физической нагрузки, исключить стресс, не курить
- type: text
  text: Суточную мочу для исследования на катехоламины, метанефрины, метаболиты катехоламинов, С-пептид,
    инсулин, гистамин, стероидный профиль можно хранить при температуре 2–8 °С не более 24 часов. При
    большем сроке хранения – заморозить. В замороженном состоянии можно хранить до 1 месяца. Доставка
    в замороженном состоянии. Не размораживать
- type: text
  text: Суточная моча на кортизол и адреналин может храниться при температуре 2–8 °С до 14 суток
- type: text
  text: Моча для исследования на онкомаркерUBC-II хранится при температуре 2–8 °С не более 24 часов
- type: h2
  text: По Зимницкому
- type: text
  text: Микробиологическое исследование мочи нужно проводить до начала антибактериальной терапии и как
    можно быстрее после ее получения в случае болезни, так как микробы, содержащие в моче, быстро размножаются
    при комнатной температуре, что может дать ложные результаты при определении степени бактериальной
    обсемененности
- type: text
  text: При исследовании мочи на степень бактериурии, от момента взятия пробы мочи до доставки ее в лабораторию
    на анализ должно пройти не более 2-х часов
- type: text
  text: При исследовании мочи на наличие возбудителей урогенитальных инфекций проба может сохраняться
    до 18 часов при t 4 °С. При транспортировке проб мочи необходимо учитывать температуру внешней среды
- type: text
  text: 'Порядок сбора:'
- type: text
  text: Для анализа собирается первая утренняя моча (средняя порция)
- type: list
  items:
  - Тщательно вымойте руки и гениталии, чтобы в мочу не попали выделения из них. Подмывание следует проводить
    теплой водой с мылом в направлении от уретры к промежности
  - Насухо вытритесь чистым полотенцем
  - 'Женщины: небольшую первую порцию утренней мочи спустите в унитаз, наполните мочой контейнер'
  - 'Мужчины: отведите крайнюю плоть и выпустите небольшое количество мочи в унитаз. Не прекращая мочеиспускание,
    удерживая крайнюю плоть в отведенном состоянии, наполните мочой контейнер'
  - После этого произведите отбор пробы в вакуумную пробирку
  - Опустите трубку держателя в жидкость, вставьте вакуумную пробирку для мочи во встроенный держатель
    контейнера
  - Возьмите пробирку пробкой вниз, надавите пробкой на иглу в отверстии держателя до упора. Убедитесь,
    что игла проткнула резиновую часть крышки пробирки. Моча начнет поступать в пробирку, компенсируя
    созданный в ней вакуум
  - Пробирку с мочой доставьте в лабораторию в течение 1–2 часов
- type: text
  text: 'Для обеспечения правильного наполнения удерживайте пробирку в держателе, надавливая на ее дно
    большим пальцем, пока моча не перестанет поступать в пробирку. Если моча не поступает в пробирку или
    поток иссякает до того, как пробирка наполнилась до метки, необходимо:'
- type: text
  text: сильнее надавить на пробирку, чтобы полностью проткнуть резиновую часть ее крышки;
- type: text
  text: выньте пробирку из держателя и тщательно перемешайте ее содержимое сразу же после извлечения из
    держателя с целью смешивания пробы мочи и консерванта;
- type: text
  text: пробирку для отбора мочи переверните 8–10 раз на 180°;
- type: text
  text: выбросите контейнер и переходник в корзину для бытового мусора
- type: h2
  text: Биохимия
- type: text
  text: 'Анализы, которые сдают наиболее часто:'
- type: list
  items:
  - общий белок,
  - микроальбумин,
  - глюкоза,
  - креатинин,
  - мочевина,
  - мочевая кислота,
  - электролиты,
  - электрофорез белков и др
- type: text
  text: Перед сбором мочи провести тщательный туалет наружных половых органов. Женщинам не следует собирать
    материал во время менструации. Накануне исследования не рекомендуется употреблять овощи и фрукты,
    которые могут изменить цвет мочи (свекла, морковь, черника и др.), по возможности не принимать ряд
    медикаментов (диуретики, витамины группы В, фурагин, аспирин). Биоматериал принимается только в одноразовых
    стерильных пластиковых контейнерах
- type: h2
  text: Гормоны
- type: text
  text: 'Анализы, которые сдают наиболее часто:'
- type: list
  items:
  - кортизол,
  - С-пептид,
  - метанефрины и норметанефрины,
  - адреналин,
  - норадреналин,
  - дофамин,
  - серотонин,
  - гистамин
- type: text
  text: За 3 дня до сбора мочи не употреблять алкоголь, исключить интенсивные физические нагрузки, отменить
    прием лекарственных препаратов (по согласованию с врачом). Накануне не переедать, не употреблять жирную,
    жареную, соленую пищу; не курить
- type: text
  text: Емкость с мочой должна храниться в холодильнике при t 4-8 °С в течение всего времени сбора! Избегать
    попадания света на образец. Держите мочу в недосягаемом для детей месте, так как в качестве консерванта
    при сборе суточной мочи может использоваться концентрированная кислота. Недопустимо направлять мочу
    на исследование в емкостях, не предназначенных для этих целей, так как остатки ингредиентов, содержащихся
    в них, могут существенным образом исказить результаты анализа
- type: text
  text: 'Правила сбора:'
- type: text
  text: Утром в 06:00 часов полностью опорожнить мочевой пузырь. Затем собирать всю мочу в течение суток
    в 3-х контейнер, последний раз утром в 06:00 часов следующего дня
- type: text
  text: По окончании сбора суточной мочи пробу тщательно перемешать (15-30 раз плавно перевернуть плотно
    закрытый контейнер), затем точно измерить количество мочи в миллилитрах (суточный диурез), которое
    позже необходимо будет указать на этикетке пробирки
- type: text
  text: С помощью специально переходника набрать мочу из контейнера в вакуумную пробирку с бежевой крышкой
- type: text
  text: На этикетке пробирки с мочой написать разборчиво Ф.И.О., суточный диурез в миллилитрах, дату и
    наименование исследования
- type: text
  text: Для детей до 14 лет в некоторых случаях требуется указать рост и вес
- type: text
  text: Пробирку с отобранной суточной мочой доставить в медицинский центр
- type: h2
  text: Посев на микрофлору с чувствительностью к антибиотикам
- type: text
  text: Моча собирается пациентом самостоятельно и доставляется в медицинский центр
- type: text
  text: ВАЖНО!
- type: text
  text: Моча сдается в специальную вакуумную пробирку, которая позволяет сохранить биоматериал без потери
    информативности в течение 2-х суток при температуре 17-23 °С. Не рекомендуется взятие биоматериала
    на фоне проведения антибактериальной и антимикотической терапии
- type: text
  text: Туалет наружных половых органов (подмывание) следует проводить теплой водой с мылом в направлении
    от уретры к промежности с последующим подсушиванием салфеткой в том же направлении. Насухо вытереться
    чистым полотенцем. Снять крышку с контейнера для мочи, повернув ее против часовой стрелки
- type: text
  text: 'Женщины: Небольшую первую порцию утренней мочи спустить в унитаз, наполнить мочой контейнер'
- type: text
  text: 'Мужчины: Отвести крайнюю плоть и выпустить небольшое количество мочи в унитаз. Не прекращая мочеиспускание,
    удерживая крайнюю плоть в отведенном состоянии, наполнить мочой контейнер'
- type: text
  text: Опустить трубку держателя в жидкость
- type: text
  text: Вставить вакуумную пробирку для мочи во встроенный держатель контейнера
- type: text
  text: 'Взять пробирку пробкой вниз, надавить пробкой на иглу в отверстии держателя до упора. Убедиться,
    что игла проткнула резиновую часть крышки пробирки. Моча начнет поступать в пробирку, компенсируя
    созданный в ней вакуум. Для обеспечения правильного наполнения удерживать пробирку в держателе, надавливая
    на её дно большим пальцем, пока моча не перестанет поступать в пробирку. Если моча не поступает в
    пробирку или поток иссякает до того, как пробирка наполнилась до метки, необходимо:'
- type: list
  items:
  - Сильнее надавить на пробирку, чтобы полностью проткнуть резиновую часть её крышки;
  - Если моча всё ещё не поступает, заменить пробирку
- type: text
  text: Вынуть пробирку из держателя
- type: text
  text: Тщательно перемешать содержимое пробирки сразу же после извлечения из держателя с целью смешивания
    пробы мочи и консерванта. Пробирки для отбора мочи перевернуть 8-10 раз на 180°
- type: text
  text: Выбросить контейнер и переходник в бытовой мусор
- type: h2
  text: Общий анализ (копрограмма)
- type: text
  text: 'У женщин репродуктивного возраста на результаты гормональных исследований влияют физиологические
    факторы, связанные с фазой менструального цикла. Во время обследования на половые гормоны нужно указать
    фазу менструального цикла. Гормоны репродуктивной системы необходимо сдавать строго по дням цикла:'
- type: list
  items:
  - ЛГ, ФСГ — 2-3 день цикла;
  - Эстрадиол — 2-3 или 21-23 день цикла;
  - Прогестерон — 21-23 день цикла, при 28-дневном цикле. Если цикл более или менее 28 дней, то за 7 дней
    до предполагаемой менструации
  - 17-ОН-прогестерон, Тестостерон — 2-3 день;
  - Дигидротестостерон, Андростендион глюкуронид, Свободный тестостерон, Андростендион, Глобулин, связывающий
    половые гормоны, Антимюллеров гормон — на 2-3 день цикла
- type: h2
  text: Половые гормоны
- type: text
  text: На 2-3 день менструального цикла кровь сдавать утром, в состоянии покоя, перед исследованием исключить
    пальпацию молочных желез
- type: h2
  text: Пролактин, Макропролактин
- type: text
  text: Не проводить исследование во время острых периодов заболеваний и во время приема антикоагулянтных
    препаратов (после отмены должно пройти не менее 30 дней). Биоматериал на исследование необходимо сдавать
    натощак. Между последним приёмом пищи и взятием крови должно пройти не менее 8 часов. Женщинам не
    рекомендуется проводить исследования на гемостаз во время менструации
- type: h2
  text: Протеин С, Протеин S, фактор Виллебранда
- type: h2
  text: ПСА (общий, свободный)
- type: text
  text: После биопсии предстательной железы и массажа простаты кровь для определения ПСА можно сдавать
    не ранее чем через 2 недели. Постхирургический уровень ПСА определяется не ранее чем через 6 недель
    после вмешательства
- type: h2
  text: Ренин, ангиотензин
- type: text
  text: Перед исследованием исключить прием эстрогенов (за 1-2 мес.), диуретиков (за 3 недели), гипотензивных
    препаратов (за одну неделю). Взятие крови осуществлять в положении сидя или стоя
- type: h2
  text: СА-125 яичники
- type: text
  text: Более информативно сдавать через 2-3 дня после менструации
- type: h2
  text: ФиброТест, ФиброМакс, СтеатоСкрин
- type: text
  text: Взятие крови проводится строго натощак в утренние часы. За 1-2 дня до исследования не рекомендуется
    принимать аскорбиновую кислоту, необходимо также исключить лекарства и продукты, вызывающие искусственную
    окраску сыворотки (морковь, апельсин)
- type: text
  text: Для проведения исследования Фибром Акс необходимо указать свой точный вес и рост
- type: h2
  text: Холестерин, липопротеины
- type: text
  text: За две недели до исследования необходимо отменить препараты, понижающие уровень липидов в крови,
    если не ставится цель определить гиполипидемический эффект терапии этими препаратами
