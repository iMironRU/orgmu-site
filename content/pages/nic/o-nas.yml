slug: o-nas
title: О Научно-исследовательском центре
toc:
  numbered: true
breadcrumb:
  href: /nic
  label: Научно-исследовательский центр
lead: Структура центра, лаборатории, направления исследований и контакты.
blocks:
- type: h2
  text: История создания
- type: text
  text: Научно-исследовательский центр создан решением ученого совета ФГБОУ ВО «Оренбургский государственный
    медицинский университет» Минздрава России
- type: text
  text: 'Задачи НИЦ:'
- type: list
  items:
  - проведение передовых научных исследований, направленных на выявление и профилактику инфекционных и
    неинфекционных заболеваний населения;
  - координация внедрения прорывных научных исследований в сфере охраны здоровья человека;
  - оказание высокотехнологичных услуг для предприятий и населения, в том числе по проведению лабораторных
    исследований биологических материалов;
  - продвижение инновационной наукоемкой продукции и услуг в сфере охраны здоровья человека;
  - проведение научных исследований по заказу органов государственной власти, предприятий, организаций
    и населения, а также преподавателей и студентов
- type: h2
  text: Структура
- type: text
  text: 'В состав Научно-исследовательского центра входят:'
- type: text
  text: У истоков создания иммунологической лаборатории, которая была создана в 1976 году, стояли будущие
    академики РАН – О.В. Бухарин и Г.Т. Сухих, Заслуженный работник Высшей школы, профессор Б.А. Фролов,
    Заслуженный работник Высшей школы, профессор А.И. Смолягин. В настоящее время лаборатория входит в
    состав научно-исследовательского центра ОрГМУ
- type: text
  text: Иммунологическая лаборатория сегодня продолжает как научное, так и практическое сотрудничество
    с клиниками Оренбурга и Оренбургской области. Лаборатория предоставляет возможность выполнить более
    15 лабораторных исследований на высоком методическом уровне. Для этого используются лабораторные технологии,
    гарантирующие точность и достоверность анализов. Качество проводимых исследований контролируется Федеральной
    службой внешней оценки качества (г. Москва). В арсенале лаборатории современные сертифицированные
    расходные материалы и реагенты зарубежного и отечественного производства для выполнения анализов
- type: text
  text: 'Лабораторные исследования проводятся по 3-м направлениям:'
- type: h2
  text: Определение уровня гормонов и антител при патологии щитовидной железы
- type: list
  items:
  - 1.Определение основных параметров иммунной системы (иммунный статус) Для объективной оценки состояния
    иммунной системы человека в лаборатории проводится определение параметров иммунного статуса. Иммунный
    статус - это совокупность количественных и функциональных показателей, отражающих состояние иммунной
    системы человека в данный момент времени
- type: text
  text: 'В лаборатории проводится определение следующих показателей иммунного статуса:'
- type: list
  items:
  - CD3-лимфоциты - зрелые Т-лимфоциты;
  - CD20-лимфоциты - зрелые В-лимфоциты;
  - CD4 – лимфоциты - Т-хелперы;
  - CD8 – лимфоциты - цитотоксические Т-лимфоциты;
  - 'Фагоцитарные показатели – оценивают бактерицидную активность сегментоядерных нейтрофилов: процент
    активных нейтрофилов (ФП), степень активности нейтрофилов (ФИ), окислительно-восстановительные механизмы
    в нейтрофилах (НСТ-тест);'
  - Иммуноглобулины сыворотки классов А, М, G, Е - основные параметры гуморального иммунитета;
  - Циркулирующие иммунные комплексы – показатель, определяющий степень противобактериальной защиты, наличия
    и развития аутоиммунных заболеваний
- type: h2
  text: Аллергодиагностика
- type: text
  text: Аллергические заболевания очень разнообразны по своим проявлениям, часто скрываются под маской
    других болезней, поэтому своевременная и точная диагностика играет решающую роль в том, насколько
    эффективным будет лечение, и как изменится в конечном итоге качество жизни пациента. Неоценимую помощь
    врачу–клиницисту оказывает современная лабораторная диагностика. В нашей лаборатории проводится определение
    антител к более чем 30 аллергенам, среди которых - пищевые, бытовые, пыльцевые, лекарственные аллергены
- type: h2
  text: Определение уровня гормонов и антител при патологии щитовидной железы
- type: text
  text: Большое значение определение гормонов имеет при различных заболеваниях щитовидной железы, а также
    для контроля назначения лекарственных средств
- type: list
  items:
  - Тиреотропный гормон (ТТГ) гормон, стимулирующий деятельность щитовидной железы
  - Тироксин свободный (Т4 своб) - биологически активный основной гормон щитовидной железы
  - Трийодтиронин свободный (Т3 своб) - гормон щитовидной железы, который стимулирует обмен и поглощение
    кислорода тканями
  - Антитела к тиреопероксидазе (Ат к ТПО) - показатель аутоиммунного поражения щитовидной железы
- type: text
  text: Необходимым условием для сдачи крови на все перечисленные анализы является забор крови натощак
    в ранние утренние часы
- type: text
  text: Клинико-диагностическая лаборатория функционирует с 2010 года. В настоящее время клинико-диагностическая
    лаборатория входит в состав Научно-исследовательского центра ОрГМУ
- type: text
  text: 'В состав лаборатории входят следующие подразделения:'
- type: list
  items:
  - Гематологическое
  - Общеклиническое
  - Биохимическое
  - Иммунологическое
- type: text
  text: 'Задачи лаборатории:'
- type: list
  items:
  - проведение научно-исследовательских работ;
  - проведение лабораторных исследований для пациентов клиники ОрГМУ
  - КДЛ выполняет все необходимые лабораторные исследования по назначению врачей-специалистов, консультантов
- type: text
  text: 'Лаборатория участвует в ФСВОК по следующим разделам:'
- type: list
  items:
  - Биохимия крови
  - Анализ мочи
  - Гормоны и витамины
  - Онкомаркеры
  - Гемоцитометрия – 1
- type: text
  text: На базе лаборатории проходят обучение и практику студенты 3 курса медико-профилактического факультета,
    врачи-ординаторы, курсанты института по повышению квалификации врачей. Во время практики студентов
    на базе нашей лаборатории, которая проходит в течении двух недель, мы обучаем их навыкам работы с
    оборудованием, выполнению лабораторных исследований. В нашей лаборатории проводятся научные исследования
    для кандидатских и докторских работ ОрГМУ, проводится большая работа по преаналитическому этапу исследований
    и по пробоподготовке для исследований. Для врачей клиники ОрГМУ проводятся консультации по клинической
    лабораторной диагностике, по подготовке пациентов к исследованиям, по интерпретации результатов исследований
- type: text
  text: Лабораторные исследования выполняет профессиональный коллектив клиническо-диагностической лаборатории
- type: list
  items:
  - Биохимия крови
  - Анализ мочи
  - Гормоны и витамины
  - Онкомаркеры
  - Гемоцитометрия
- type: text
  text: Результаты анализов Вы можете получить в этот же день, т.к. анализы проводятся в нашей лаборатории
    на современном зарубежном оборудовании. Результаты можем выслать на электронный адрес. Вы можете получить
    консультацию по результатам анализов
- type: text
  text: 'Лаборатория расположена на первом этаже корпуса №5 ОрГМУ (Шарлыкское шоссе, дом 5) Кадровый состав
    включает 15 сотрудников, в том числе пять кандидатов наук, осуществляющих работу в трех структурных
    подразделениях Университета:'
- type: list
  items:
  - кафедре микробиологии, вирусологии, иммунологии;
  - кафедре эпидемиологии и инфекционных болезней;
  - кафедре фармацевтической химии
- type: text
  text: 'Основные направления деятельности:'
- type: list
  items:
  - ИФА-исследования;
  - Бактериологические исследования
- type: list
  items:
  - Прием и подготовка проб
  - Выделение нуклеиновых кислот
  - Амплификация
- type: text
  text: 'Основное оборудование: ИФА-блок'
- type: list
  items:
  - Подготовка проб и инкубация планшетов
  - Отмывка планшетов
  - Детекция оптической плотности
- type: text
  text: 'Основное оборудование: Бактериологический блок'
- type: list
  items:
  - Подготовка питательных сред и посуды
  - Посевы и ин3кубация бактериальных культур
  - Идентификация и хранение бактериальных культур
