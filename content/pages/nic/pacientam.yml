    href: https://nic.orgma.ru/Content/file/Правила_предоставления_платных_медицинских_услуг.doc
- type: h2
  text: Порядок оказания платных услуг
- type: text
  text: Порядок предоставления и условия получения платных медицинских услуг в соответствии с территориальной
    программой
- type: list
  items:
  - Основанием для оказания медицинских услуг за плату является добровольное желание пациента получить
    медицинскую услугу, включая медицинскую помощь по видам помощи, предусмотренной Программой государственной
    гарантии. При этом заключается договор с пациентом на оказание медицинской услуги на платной основе
  - Договор заключается потребителем (заказчиком) и исполнителем в письменной форме
  - Платные медицинские услуги предоставляются при наличии добровольного информированного согласия потребителя
- type: h2
  text: Порядок заключения договора и оплаты медицинских услуг
- type: h2
  text: 'Договор содержит: - сведения об исполнителе:'
- type: list
  items:
  - наименование и фирменное наименование (если имеется) медицинской организации - юридического лица,
    адрес места нахождения, данные документа, подтверждающего факт внесения сведений о юридическом лице
    в Единый государственный реестр юридических лиц, с указанием органа, осуществившего государственную
    регистрацию;
  - фамилия, имя и отчество (если имеется) индивидуального предпринимателя, адрес места жительства и адрес
    места осуществления медицинской деятельности, данные документа, подтверждающего факт внесения сведений
    об индивидуальном предпринимателе в Единый государственный реестр индивидуальных предпринимателей,
    с указанием органа, осуществившего государственную регистрацию;
  - номер лицензии на осуществление медицинской деятельности, дата ее регистрации с указанием перечня
    работ (услуг), составляющих медицинскую деятельность медицинской организации в соответствии с лицензией,
    наименование, адрес места нахождения и телефон выдавшего лицензию лицензирующего органа;
  - фамилию, имя и отчество (если имеется), адрес места жительства и телефон потребителя (законного представителя
    потребителя);
  - фамилию, имя и отчество (если имеется), адрес места жительства и телефон заказчика – физического лица;
  - наименование и адрес места нахождения заказчика - юридического лица;
  - перечень платных медицинских услуг, предоставляемых в соответствии с договором;
  - стоимость платных медицинских услуг, сроки и порядок их оплаты;
  - условия и сроки предоставления платных медицинских услуг;
  - должность, фамилию, имя, отчество (если имеется) лица, заключающего договор от имени исполнителя,
    и его подпись, фамилию, имя, отчество (если имеется) потребителя (заказчика) и его подпись. В случае
    если заказчик является юридическим лицом, указывается должность лица, заключающего договор от имени
    заказчика;
  - ответственность сторон за невыполнение условий договора;
  - порядок изменения и расторжения договора;
  - иные условия, определяемые по соглашению сторон
- type: text
  text: Договор заключается потребителем и исполнителем, он составляется в 2 экземплярах
- type: text
  text: В случае отказа потребителя после заключения договора от получения медицинских услуг договор расторгается.
    Исполнитель информирует потребителя (заказчика) о расторжении договора по инициативе потребителя,
    при этом потребитель (заказчик) оплачивает исполнителю фактически понесенные исполнителем расходы,
    связанные с исполнением обязательств по договору
- type: text
  text: Потребитель (заказчик) обязан оплатить предоставленную исполнителем медицинскую услугу в сроки
    и в порядке, которые определены договором
- type: text
  text: Потребителю (заказчику) в соответствии с законодательством Российской Федерации выдается документ,
    подтверждающий произведенную оплату предоставленных медицинских услуг (контрольно-кассовый чек, квитанция
    или иной бланк строгой отчетности (документ установленного образца))
- type: text
  text: Исполнителем после исполнения договора выдаются потребителю (законному представителю потребителя)
    медицинские документы (копии медицинских документов, выписки из медицинских документов), отражающие
    состояние его здоровья после получения платных медицинских услуг
- type: h2
  text: Порядок предоставления платных медицинских услуг
- type: h2
  text: 'Исполнитель предоставляет потребителю (законному представителю потребителя) по его требованию
    и в доступной для него форме информацию:'
- type: list
  items:
  - о состоянии его здоровья, включая сведения о результатах обследования, диагнозе, методах лечения,
    связанном с ними риске, возможных вариантах и последствиях медицинского вмешательства, ожидаемых результатах
    лечения;
  - об используемых при предоставлении платных медицинских услуг лекарственных препаратах и медицинских
    изделиях, в том числе о сроках их годности (гарантийных сроках), показаниях (противопоказаниях) к
    применению
- type: h2
  text: Как узнать результаты анализа?
- type: list
  items:
  - результат анализа вы можете узнать в том пункте где сдавали биоматериал
  - 'по эл.почте: если при оформлении заказа вы оставили свой эл.адрес почты то результат Вам будет на
    направлен на почту в формате PDF'
  - сделав запрос на эл.почту лаборатории НИЦ – если в направлении по какой либо причине вы не указали
    ваш эл.адрес то вы можете написать нам запрос на почту nic@orgma.ru или позвонить по тел. 50-06-06
    доб. 512 с 9.00 до 16.00
