<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
</helmet>
<sc-if value="{{ visible }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed; left:16px; right:16px; bottom:16px; z-index:1000; display:flex; justify-content:center; pointer-events:none;">
    <div style="pointer-events:auto; display:flex; align-items:center; gap:16px; flex-wrap:wrap; max-width:640px; width:100%; background:rgb(255,255,255); border:1px solid rgb(238,238,238); border-radius:12px; box-shadow:0 4px 4px rgba(0,0,0,0.10); padding:14px 18px; font-family:'Roboto Condensed',sans-serif;">
      <div style="flex:1 1 260px; font-size:14px; line-height:1.45; color:rgb(103,103,103);">
        Мы используем файлы cookie для корректной работы сайта. Продолжая пользоваться сайтом, вы соглашаетесь с
        <a href="Privacy.dc.html" style="color:rgb(0,101,155); text-decoration:underline;" style-hover="color:rgb(0,79,122);">политикой обработки данных</a>.
      </div>
      <div style="display:flex; align-items:center; gap:8px; flex:0 0 auto;">
        <button onClick="{{ accept }}" style="cursor:pointer; border:none; background:rgb(0,101,155); color:#fff; font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:14px; padding:9px 18px; border-radius:8px; transition:background 150ms;" style-hover="background:rgb(0,79,122);">Хорошо</button>
      </div>
    </div>
  </div>
</sc-if>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:80}}">
class Component extends DCLogic {
  state = { visible: false };

  componentDidMount() {
    try {
      if (!localStorage.getItem('orgma-cookie-consent')) {
        this.setState({ visible: true });
      }
    } catch (e) {
      this.setState({ visible: true });
    }
  }

  accept = () => {
    try { localStorage.setItem('orgma-cookie-consent', '1'); } catch (e) {}
    this.setState({ visible: false });
  };

  renderVals() {
    return {
      visible: this.state.visible,
      accept: this.accept,
    };
  }
}

</script>
</body>
</html>
