<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:94px; align-self:stretch; min-height:100%; background:rgb(0,101,155); display:flex; flex-direction:column; font-family:'Roboto Condensed',sans-serif; position:relative; z-index:300;">
  <div style="position:sticky; top:0; display:flex; flex-direction:column; align-items:center; padding:20px 0;">

    <sc-for list="{{ groups }}" as="grp" hint-placeholder-count="4">
      <sc-if value="{{ grp.divider }}" hint-placeholder-val="{{ false }}">
        <div style="width:44px; height:1px; background:rgba(255,255,255,0.18); margin:14px 0;"></div>
      </sc-if>
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <sc-for list="{{ grp.items }}" as="it" hint-placeholder-count="3">
          <div style="position:relative;">
            <a href="{{ it.href }}" title="{{ it.title }}" onClick="{{ it.onClick }}" style="position:relative; display:flex; align-items:center; justify-content:center; width:46px; height:46px; border-radius:12px; color:rgb(255,255,255); text-decoration:none; background:{{ it.bg }}; transition:background 150ms;" style-hover="background:rgba(255,255,255,0.16);">
              {{ it.node }}
            </a>
            <sc-if value="{{ it.showFlyout }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute; left:56px; top:50%; transform:translateY(-50%); z-index:400; background:#fff; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.22); padding:6px; display:flex; flex-direction:column; min-width:130px; animation:sr-pop 160ms cubic-bezier(0.4,0,0.2,1);">
                <sc-for list="{{ langs }}" as="l" hint-placeholder-count="3">
                  <button onClick="{{ l.pick }}" style="display:flex; align-items:center; justify-content:space-between; gap:10px; font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:16px; color:{{ l.color }}; background:{{ l.bg }}; border:none; border-radius:8px; padding:10px 14px; cursor:pointer; text-align:left; white-space:nowrap;">{{ l.label }}<span style="font-size:13px; color:rgb(150,150,150);">{{ l.code }}</span></button>
                </sc-for>
              </div>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </sc-for>

  </div>

  <helmet><style>@keyframes sr-pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}</style></helmet>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:94,&quot;height&quot;:620}}">
class Component extends DCLogic {
  state = { lang: "РУС", langOpen: false };

  svg(attrs, ...children) {
    return React.createElement("svg", Object.assign({ width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.9, strokeLinecap: "round", strokeLinejoin: "round" }, attrs), children);
  }
  path(d, extra) { return React.createElement("path", Object.assign({ key: d.slice(0, 6), d }, extra)); }

  icons() {
    const p = (d, e) => this.path(d, e);
    return {
      search: this.svg({}, p("M11 4a7 7 0 1 0 0 14 7 7 0 0 0 0-14Z"), p("M20 20l-4-4")),
      apps: this.svg({}, p("M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z")),
      // brand glyphs: filled
      vk: this.svg({ fill: "currentColor", stroke: "none" }, p("M12.9 16.6c-5 0-8.2-3.5-8.3-9.2h2.6c.1 4.2 2 6 3.5 6.4V7.4h2.4v3.6c1.5-.2 3-1.8 3.6-3.6h2.4c-.5 2.2-2.1 3.8-3.2 4.5 1.1.6 2.9 2 3.6 4.7h-2.7c-.5-1.7-1.9-3.1-3.7-3.2v3.2h-.2Z")),
      tg: this.svg({ fill: "currentColor", stroke: "none" }, p("M21.9 5.3 18.9 19c-.2 1-.8 1.2-1.6.8l-4.4-3.3-2.1 2c-.24.24-.43.43-.88.43l.31-4.5 8.2-7.4c.36-.32-.08-.5-.55-.18L7.5 13.3l-4.4-1.4c-.95-.3-.97-.95.2-1.4L20.6 3.9c.8-.3 1.5.18 1.3 1.4Z")),
      youtube: this.svg({ fill: "currentColor", stroke: "none" }, p("M23 8.2a3 3 0 0 0-2.1-2.1C19 5.6 12 5.6 12 5.6s-7 0-8.9.5A3 3 0 0 0 1 8.2 31 31 0 0 0 .6 12 31 31 0 0 0 1 15.8a3 3 0 0 0 2.1 2.1c1.9.5 8.9.5 8.9.5s7 0 8.9-.5a3 3 0 0 0 2.1-2.1c.4-1.9.4-3.8.4-3.8s0-1.9-.4-3.8ZM9.8 15.3V8.7l5.7 3.3-5.7 3.3Z")),
      access: this.svg({}, p("M12 4.2a1.6 1.6 0 1 0 0 3.2 1.6 1.6 0 0 0 0-3.2Z", { fill: "currentColor", stroke: "none" }), p("M4.5 8.2c2.4.9 4.9 1.3 7.5 1.3s5.1-.4 7.5-1.3"), p("M12 9.5v5M9 20l3-5.5L15 20")),
      globe: this.svg({}, p("M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18Z"), p("M3.5 9h17M3.5 15h17"), p("M12 3c2.5 2.4 3.9 5.6 3.9 9s-1.4 6.6-3.9 9c-2.5-2.4-3.9-5.6-3.9-9S9.5 5.4 12 3Z")),
    };
  }

  renderVals() {
    const ic = this.icons();
    const groups = [
      { divider: false, items: [
        { title: "Поиск по сайту", href: "#", node: ic.search },
      ]},
      { divider: true, items: [
        { title: "Приложения вуза", href: "Apps.dc.html", node: ic.apps },
      ]},
      { divider: true, items: [
        { title: "ВКонтакте", href: "https://vk.com/orgma_ru", node: ic.vk },
        { title: "Telegram", href: "https://t.me/orgma_ru", node: ic.tg },
        { title: "YouTube", href: "#", node: ic.youtube },
      ]},
      { divider: true, items: [
        { title: "Язык / Language / Тіл", href: "#", node: this.langGlyph(), onClick: (e) => { e.preventDefault(); this.setState(s => ({ langOpen: !s.langOpen })); }, bg: this.state.langOpen ? "rgba(255,255,255,0.16)" : "transparent", showFlyout: this.state.langOpen },
        { title: "Настройки доступности", href: "Accessibility.dc.html", node: ic.access },
      ]},
    ].map(g => ({ divider: g.divider, items: g.items.map(it => ({ title: it.title, href: it.href, node: it.node, onClick: it.onClick || (() => {}), bg: it.bg || "transparent", showFlyout: !!it.showFlyout })) }));

    const langData = [
      { label: "Русский", code: "РУС" },
      { label: "English", code: "ENG" },
      { label: "Қазақша", code: "ҚАЗ" },
    ];
    const langs = langData.map(l => ({
      label: l.label, code: l.code,
      color: this.state.lang === l.code ? "rgb(0,101,155)" : "rgb(50,100,150)",
      bg: this.state.lang === l.code ? "rgba(184,57,4,0.12)" : "transparent",
      pick: () => this.setState({ lang: l.code, langOpen: false }),
    }));

    return { groups, langs, langOpen: this.state.langOpen };
  }

  langGlyph() {
    return React.createElement("span", { style: { fontFamily: "'Roboto Condensed',sans-serif", fontWeight: 700, fontSize: 13, letterSpacing: "0.02em" } }, this.state.lang);
  }
}
</script>
</body>
</html>
