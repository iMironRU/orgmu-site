<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div ref="{{ rootRef }}" style="position:relative; width:100%; font-family:'Roboto Condensed',sans-serif;">
  <button onClick="{{ toggle }}" style="display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; box-sizing:border-box; font-family:'Roboto Condensed',sans-serif; font-size:16px; text-align:left; color:{{ valueColor }}; padding:11px 14px; border:1px solid {{ borderColor }}; border-radius:9px; background:#fff; cursor:pointer;">
    <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ display }}</span>
    <span style="flex:0 0 auto; display:flex; align-items:center; gap:6px;">
      <sc-if value="{{ showCount }}" hint-placeholder-val="{{ false }}"><span style="font-family:'Inter',sans-serif; font-size:12px; font-weight:700; color:#fff; background:rgb(184,57,4); border-radius:999px; min-width:20px; height:20px; padding:0 6px; display:inline-flex; align-items:center; justify-content:center;">{{ count }}</span></sc-if>
      <span style="color:rgb(107,130,153); transform:{{ chevron }}; transition:transform 160ms; display:flex;"><svg width="12" height="8" viewBox="0 0 12 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l5 5 5-5"></path></svg></span>
    </span>
  </button>

  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; z-index:50; top:calc(100% + 6px); left:0; right:0; background:#fff; border:1px solid rgb(228,232,236); border-radius:12px; box-shadow:0 12px 32px rgba(15,40,70,0.16); overflow:hidden;">
      <sc-if value="{{ searchable }}" hint-placeholder-val="{{ true }}">
        <div style="padding:10px; border-bottom:1px solid rgb(240,240,240);">
          <div style="display:flex; align-items:center; gap:8px; background:rgb(248,250,252); border:1px solid rgb(228,232,236); border-radius:8px; padding:8px 10px;">
            <span style="flex:0 0 auto; color:rgb(150,150,150); display:flex;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4-4"></path></svg></span>
            <input type="text" value="{{ q }}" onInput="{{ onSearch }}" placeholder="Поиск…" autofocus style="flex:1; min-width:0; border:none; outline:none; background:transparent; font-family:'Roboto Condensed',sans-serif; font-size:15px; color:rgb(49,49,49);">
          </div>
        </div>
      </sc-if>
      <div style="max-height:260px; overflow-y:auto; padding:6px;">
        <sc-for list="{{ items }}" as="o" hint-placeholder-count="5">
          <button onClick="{{ o.pick }}" style="display:flex; align-items:center; gap:11px; width:100%; box-sizing:border-box; text-align:left; font-family:'Roboto Condensed',sans-serif; font-size:16px; color:{{ o.color }}; font-weight:{{ o.weight }}; background:{{ o.bg }}; border:none; border-radius:8px; padding:10px 12px; cursor:pointer;" style-hover="background:rgb(245,248,251)">
            <sc-if value="{{ o.multi }}" hint-placeholder-val="{{ true }}">
              <span style="flex:0 0 auto; width:20px; height:20px; border-radius:6px; border:2px solid {{ o.boxBorder }}; background:{{ o.boxBg }}; display:flex; align-items:center; justify-content:center;"><sc-if value="{{ o.selected }}" hint-placeholder-val="{{ false }}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-10"></path></svg></sc-if></span>
            </sc-if>
            <sc-if value="{{ o.single }}" hint-placeholder-val="{{ false }}">
              <span style="flex:0 0 auto; width:18px; display:flex; color:rgb(0,101,155);"><sc-if value="{{ o.selected }}" hint-placeholder-val="{{ false }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-10"></path></svg></sc-if></span>
            </sc-if>
            <span style="flex:1;">{{ o.label }}</span>
          </button>
        </sc-for>
        <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
          <div style="padding:16px 12px; text-align:center; font-size:15px; color:rgb(150,150,150);">Ничего не найдено</div>
        </sc-if>
      </div>
      <sc-if value="{{ canClear }}" hint-placeholder-val="{{ false }}">
        <div style="border-top:1px solid rgb(240,240,240); padding:8px;">
          <button onClick="{{ clear }}" style="width:100%; font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:14px; color:rgb(184,57,4); background:none; border:none; padding:8px; cursor:pointer;">Очистить выбор</button>
        </div>
      </sc-if>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:52},&quot;options&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Array&lt;string|{value:string,label:string}&gt;&quot;},&quot;value&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string|string[]&quot;},&quot;multi&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;searchable&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Выберите&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(v:string|string[])=&gt;void&quot;}}">
class Component extends DCLogic {
  state = { open: false, q: "" };
  rootRef = React.createRef();

  componentDidMount() {
    this._onDoc = (e) => {
      if (this.state.open && this.rootRef.current && !this.rootRef.current.contains(e.target)) {
        this.setState({ open: false, q: "" });
      }
    };
    document.addEventListener("mousedown", this._onDoc);
  }
  componentWillUnmount() { document.removeEventListener("mousedown", this._onDoc); }

  norm(opts) {
    return (opts || []).map(o => (typeof o === "string" ? { value: o, label: o } : o));
  }
  selArray() {
    const v = this.props.value;
    if (this.props.multi) return Array.isArray(v) ? v : [];
    return v == null || v === "" ? [] : [v];
  }

  renderVals() {
    const multi = !!this.props.multi;
    const searchable = this.props.searchable !== false;
    const placeholder = this.props.placeholder || "Выберите";
    const opts = this.norm(this.props.options);
    const sel = this.selArray();
    const q = this.state.q.trim().toLowerCase();
    const shown = q ? opts.filter(o => o.label.toLowerCase().includes(q)) : opts;

    const emit = (arr) => { if (typeof this.props.onChange === "function") this.props.onChange(multi ? arr : (arr[0] ?? "")); };

    const pickVal = (val) => {
      if (multi) {
        const has = sel.includes(val);
        emit(has ? sel.filter(x => x !== val) : [...sel, val]);
      } else {
        emit([val]);
        this.setState({ open: false, q: "" });
      }
    };

    const items = shown.map(o => {
      const isSel = sel.includes(o.value);
      return {
        label: o.label, value: o.value, selected: isSel, multi, single: !multi,
        color: isSel ? "rgb(0,101,155)" : "rgb(50,100,150)",
        weight: isSel ? 700 : 400,
        bg: isSel && !multi ? "rgba(184,57,4,0.10)" : "transparent",
        boxBorder: isSel ? "rgb(184,57,4)" : "rgb(200,208,216)",
        boxBg: isSel ? "rgb(184,57,4)" : "#fff",
        pick: () => pickVal(o.value),
      };
    });

    // Display text
    let display = placeholder, valueColor = "rgb(150,150,150)";
    if (sel.length) {
      const labelOf = (v) => { const f = opts.find(o => o.value === v); return f ? f.label : v; };
      if (multi) { display = sel.length === 1 ? labelOf(sel[0]) : labelOf(sel[0]) + " +" + (sel.length - 1); }
      else { display = labelOf(sel[0]); }
      valueColor = "rgb(49,49,49)";
    }

    return {
      rootRef: this.rootRef,
      open: this.state.open, q: this.state.q, searchable,
      toggle: () => this.setState(s => ({ open: !s.open, q: "" })),
      onSearch: (e) => this.setState({ q: e.target.value }),
      display, valueColor,
      borderColor: this.state.open ? "rgb(184,57,4)" : "rgb(217,217,217)",
      chevron: this.state.open ? "rotate(180deg)" : "rotate(0deg)",
      showCount: multi && sel.length > 1, count: sel.length,
      items, noResults: items.length === 0,
      canClear: multi && sel.length > 0,
      clear: () => { emit([]); },
    };
  }
}
</script>
</body>
</html>
