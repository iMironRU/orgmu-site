<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <style>@media(max-width:640px){.banner-page{grid-template-columns:1fr!important}}</style>
</helmet>
<!-- Слайдер баннеров: показывает по 2 карточки за раз, листает страницами. -->
<section class="banner-slider" style="position:relative; font-family:'Roboto Condensed',sans-serif;">
  <div style="overflow:hidden; border-radius:8px;">
    <div style="display:flex; width:{{ bannerTrackWidth }}; transform:translateX({{ bannerOffset }}); transition:transform 360ms cubic-bezier(0.4,0,0.2,1);">
      <sc-for list="{{ bannerPages }}" as="page" hint-placeholder-count="3">
        <div class="banner-page" style="flex:0 0 {{ bannerPageWidth }}; display:grid; grid-template-columns:repeat(2,1fr); gap:16px; padding-right:16px; box-sizing:border-box;">
          <sc-for list="{{ page.items }}" as="b" hint-placeholder-count="2">
            <dc-import name="Banner" image="{{ b.image }}" kicker="{{ b.kicker }}" title="{{ b.title }}" tone="{{ b.tone }}" hint-size="100%,192px"></dc-import>
          </sc-for>
        </div>
      </sc-for>
    </div>
  </div>

  <sc-if value="{{ bannerHasMultiplePages }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ bannerPrev }}" aria-label="Предыдущие баннеры" style="position:absolute; left:-18px; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%; border:1px solid rgb(238,238,238); background:#fff; color:rgb(0,101,155); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.12);" style-hover="background:rgb(251,251,251);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"></path></svg>
    </button>
    <button onClick="{{ bannerNext }}" aria-label="Следующие баннеры" style="position:absolute; right:-18px; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%; border:1px solid rgb(238,238,238); background:#fff; color:rgb(0,101,155); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.12);" style-hover="background:rgb(251,251,251);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
    </button>
    <div style="display:flex; justify-content:center; gap:8px; margin-top:14px;">
      <sc-for list="{{ bannerDots }}" as="dot" hint-placeholder-count="3">
        <button onClick="{{ dot.go }}" aria-label="{{ dot.label }}" style="width:{{ dot.size }}; height:8px; border-radius:4px; border:none; background:{{ dot.bg }}; cursor:pointer; padding:0; transition:background 150ms, width 150ms;"></button>
      </sc-for>
    </div>
  </sc-if>
</section>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1146,&quot;height&quot;:230},&quot;banners&quot;:{&quot;editor&quot;:null,&quot;default&quot;:null,&quot;tsType&quot;:&quot;Array&lt;{kicker:string,title:string,image:string,tone:string}&gt;&quot;}}">
class Component extends DCLogic {
  state = { bannerPage: 0 };

  bannersData() {
    // Заглушка на 6 баннеров — заменить реальными данными (CMS/API).
    return this.props.banners || [
      { kicker: "Абитуриенту", title: "Приёмная кампания 2024 открыта", image: "assets/corpus.jpg", tone: "rgb(0,101,155)" },
      { kicker: "", title: "День открытых дверей 20 апреля", image: "", tone: "rgb(48,176,199)" },
      { kicker: "Наука", title: "Приём заявок на гранты молодых учёных", image: "assets/corpus.jpg", tone: "rgb(88,86,214)" },
      { kicker: "", title: "Запись в спортивные секции университета", image: "", tone: "rgb(170,136,99)" },
      { kicker: "Библиотека", title: "Новое поступление электронных учебников", image: "assets/corpus.jpg", tone: "rgb(0,101,155)" },
      { kicker: "", title: "Волонтёрский набор на «Ночь музеев»", image: "", tone: "rgb(48,176,199)" },
    ];
  }

  renderVals() {
    const banners = this.bannersData();
    const perPage = 2;
    const pageCount = Math.ceil(banners.length / perPage);
    const page = ((this.state.bannerPage % pageCount) + pageCount) % pageCount;
    const goTo = (i) => this.setState({ bannerPage: i });

    const pages = [];
    for (let i = 0; i < pageCount; i++) pages.push({ items: banners.slice(i * perPage, i * perPage + perPage) });

    return {
      bannerPages: pages,
      bannerTrackWidth: (pageCount * 100) + "%",
      bannerPageWidth: (100 / pageCount) + "%",
      bannerOffset: "-" + (page * (100 / pageCount)) + "%",
      bannerHasMultiplePages: pageCount > 1,
      bannerPrev: () => goTo(page - 1),
      bannerNext: () => goTo(page + 1),
      bannerDots: pages.map((p, i) => ({
        go: () => goTo(i),
        label: "Слайд " + (i + 1),
        size: i === page ? "22px" : "8px",
        bg: i === page ? "rgb(0,101,155)" : "rgb(217,217,217)",
      })),
    };
  }
}

</script>
</body>
</html>
