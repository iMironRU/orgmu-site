<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
</helmet>
<sc-if value="{{ isAll }}" hint-placeholder-val="{{ false }}">
  <a href="{{ href }}" style="display:flex; align-items:center; justify-content:space-between; gap:16px; height:100%; min-height:88px; box-sizing:border-box; text-decoration:none; padding:18px 22px; background:{{ accent }}; border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,0.08); transition:box-shadow 240ms cubic-bezier(0.4,0,0.2,1), transform 240ms cubic-bezier(0.4,0,0.2,1);" style-hover="box-shadow:0 8px 20px rgba(0,0,0,0.16); transform:translateY(-2px);">
    <span style="font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:20px; line-height:1.15; color:rgb(255,255,255);">{{ label }}</span>
    <span style="flex:0 0 auto; display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:999px; background:rgba(255,255,255,0.22); color:rgb(255,255,255);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
    </span>
  </a>
</sc-if>
<sc-if value="{{ isDefault }}" hint-placeholder-val="{{ true }}">
  <a href="{{ href }}" style="display:flex; align-items:center; gap:16px; height:100%; min-height:88px; box-sizing:border-box; text-decoration:none; padding:18px 20px; background:rgb(255,255,255); border:1px solid rgb(238,238,238); border-left:4px solid {{ accent }}; border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,0.08); transition:box-shadow 240ms cubic-bezier(0.4,0,0.2,1), transform 240ms cubic-bezier(0.4,0,0.2,1);" style-hover="box-shadow:0 8px 20px rgba(0,0,0,0.12); transform:translateY(-2px);">
    <span style="flex:0 0 auto; display:flex; align-items:center; justify-content:center; width:52px; height:52px; border-radius:8px; background:{{ accentSoft }}; color:{{ accent }};">{{ iconEl }}</span>
    <span style="font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:20px; line-height:1.15; color:rgb(50,100,150); text-wrap:pretty;">{{ label }}</span>
  </a>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:90},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Клиника ОрГМУ&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;default&quot;,&quot;all&quot;],&quot;default&quot;:&quot;default&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;icon&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;book&quot;,&quot;heart&quot;,&quot;science&quot;,&quot;museum&quot;,&quot;cap&quot;],&quot;default&quot;:&quot;heart&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:[&quot;rgb(184,57,4)&quot;,&quot;rgb(48,176,199)&quot;,&quot;rgb(88,86,214)&quot;,&quot;rgb(170,136,99)&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const variant = this.props.variant ?? "default";
    const isAll = variant === "all";
    const accent = this.props.accent ?? (isAll ? "rgb(0,101,155)" : "rgb(184,57,4)");
    const paths = {
      book: "M4 5a2 2 0 0 1 2-2h5v16H6a2 2 0 0 0-2 2V5Zm16 0a2 2 0 0 0-2-2h-5v16h5a2 2 0 0 1 2 2V5Z",
      heart: "M12 20s-7-4.5-9.3-8.6C1 8.3 2.6 5 6 5c2 0 3.2 1.3 4 2.3C10.8 6.3 12 5 14 5c3.4 0 5 3.3 3.3 6.4C19 15.5 12 20 12 20Z",
      science: "M9 3v6.5L4.5 17A2 2 0 0 0 6.3 20h11.4a2 2 0 0 0 1.8-3l-4.5-7.5V3M8 3h8M8 13h8",
      museum: "M12 3 3 8h18L12 3ZM5 10v7M9 10v7M15 10v7M19 10v7M3 20h18",
      cap: "M12 4 2 9l10 5 8-4v6M6 11.5V16c0 1.1 2.7 2 6 2s6-.9 6-2v-4.5",
    };
    const d = paths[this.props.icon] || paths.book;
    return {
      isAll,
      isDefault: !isAll,
      href: this.props.href ?? "#",
      label: this.props.label ?? (isAll ? "Посмотреть все" : "Клиника ОрГМУ"),
      accent,
      accentSoft: this.props.accentSoft ?? "rgba(184,57,4,0.12)",
      iconEl: React.createElement("svg", { width: 28, height: 28, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round" }, React.createElement("path", { d })),
    };
  }
}
</script>
</body>
</html>
