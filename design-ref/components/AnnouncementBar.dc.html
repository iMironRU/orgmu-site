<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
</helmet>
<sc-if value="{{ hasItems }}" hint-placeholder-val="{{ true }}">
<div style="display:flex; flex-direction:column; gap:10px; font-family:'Roboto Condensed',sans-serif;">
  <sc-for list="{{ items }}" as="a" hint-placeholder-count="2">
    <div style="display:flex; align-items:center; gap:16px; padding:14px 18px; border-radius:10px; background:{{ a.bg }}; border-left:5px solid {{ a.accent }};">
      <span style="flex:0 0 auto; display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px; letter-spacing:0.05em; text-transform:uppercase; color:{{ a.accent }};">
        {{ a.icon }}{{ a.tag }}
      </span>
      <div style="flex:1; min-width:0; display:flex; flex-wrap:wrap; align-items:baseline; gap:4px 12px;">
        <sc-if value="{{ a.hasHref }}" hint-placeholder-val="{{ true }}">
          <a href="{{ a.href }}" style="font-weight:700; font-size:17px; color:rgb(184,57,4); text-decoration:none; text-wrap:pretty; white-space:nowrap;" style-hover="text-decoration:underline;">{{ a.title }} →</a>
        </sc-if>
        <sc-if value="{{ a.noHref }}" hint-placeholder-val="{{ false }}">
          <span style="font-weight:700; font-size:17px; color:rgb(49,49,49); text-wrap:pretty;">{{ a.title }}</span>
        </sc-if>
        <span style="font-size:15px; color:rgb(103,103,103);">{{ a.text }}</span>
      </div>
      <span style="flex:0 0 auto; display:flex; align-items:center; gap:6px; font-size:14px; font-weight:700; color:{{ a.accent }};">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7.5V12l3 2"></path></svg>
        {{ a.until }}
      </span>
      <button onClick="{{ a.dismiss }}" title="Скрыть" style="flex:0 0 auto; display:flex; align-items:center; justify-content:center; width:30px; height:30px; border:none; border-radius:8px; background:rgba(0,0,0,0.05); color:rgb(103,103,103); cursor:pointer;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 5l14 14M19 5 5 19"></path></svg>
      </button>
    </div>
  </sc-for>
</div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1146,&quot;height&quot;:140}}">
class Component extends DCLogic {
  state = { dismissed: [] };

  daysLeft(dateStr) {
    const end = new Date(dateStr + "T23:59:59");
    return Math.ceil((end - new Date()) / 86400000);
  }
  fmt(dateStr) {
    const m = ["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
    const d = new Date(dateStr + "T00:00:00");
    return d.getDate() + " " + m[d.getMonth()];
  }

  renderVals() {
    const kinds = {
      urgent:    { tag: "Срочно",  accent: "rgb(255,59,48)",  bg: "rgba(255,59,48,0.07)" },
      important: { tag: "Важно",   accent: "rgb(255,149,0)",  bg: "rgba(255,149,0,0.08)" },
      info:      { tag: "Объявление", accent: "rgb(50,173,230)", bg: "rgba(50,173,230,0.08)" },
    };
    const iconFor = (k) => {
      if (k === "urgent") return React.createElement("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.4, strokeLinecap: "round", strokeLinejoin: "round" }, React.createElement("path", { d: "M12 3 2 20h20L12 3Z" }), React.createElement("path", { d: "M12 10v4M12 17.5v.01" }));
      if (k === "important") return React.createElement("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.4, strokeLinecap: "round" }, React.createElement("path", { d: "M12 4v9M12 18v.01" }));
      return React.createElement("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.2, strokeLinecap: "round", strokeLinejoin: "round" }, React.createElement("path", { d: "M3 11l18-7-7 18-2.5-8.5L3 11Z" }));
    };

    const plus = (n) => { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); };
    const data = this.props.items || [
      { id: "a1", kind: "urgent", title: "Приём документов завершается", text: "последний день подачи оригиналов", href: "Notice.dc.html", expires: plus(2) },
      { id: "a2", kind: "important", title: "Изменение расписания занятий", text: "с понедельника корпус №2 работает по новому графику", href: "Notice.dc.html", expires: plus(9) },
    ];

    const items = data
      .filter(a => this.daysLeft(a.expires) >= 0)          // истёкшие не показываем
      .filter(a => !this.state.dismissed.includes(a.id))    // скрытые пользователем
      .map(a => {
        const k = kinds[a.kind] || kinds.info;
        const dl = this.daysLeft(a.expires);
        const until = dl === 0 ? "сегодня последний день" : dl === 1 ? "до завтра" : "до " + this.fmt(a.expires);
        return { tag: k.tag, accent: k.accent, bg: k.bg, icon: iconFor(a.kind), title: a.title, text: a.text, href: a.href, hasHref: !!a.href, noHref: !a.href, until, dismiss: () => this.setState(s => ({ dismissed: s.dismissed.concat(a.id) })) };
      });

    return { items, hasItems: items.length > 0 };
  }
}
</script>
</body>
</html>
