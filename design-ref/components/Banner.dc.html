<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
</helmet>
<a href="{{ href }}" style="position:relative; display:flex; flex-direction:column; justify-content:flex-end; min-height:192px; padding:24px; text-decoration:none; border-radius:8px; overflow:hidden; background-color:{{ tone }}; background-image:{{ imageCss }}; background-size:cover; background-position:center;">
  <div style="position:absolute; inset:0; background:linear-gradient(90deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0) 100%);"></div>
  <div style="position:relative; display:flex; flex-direction:column; gap:6px; max-width:70%;">
    <sc-if value="{{ kicker }}" hint-placeholder-val="text">
      <span style="font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:14px; letter-spacing:0.06em; text-transform:uppercase; color:rgba(255,255,255,0.85);">{{ kicker }}</span>
    </sc-if>
    <span style="font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:26px; line-height:1.1; color:rgb(255,255,255); text-wrap:pretty;">{{ title }}</span>
  </div>
</a>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:828,&quot;height&quot;:192},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Приёмная кампания 2024 открыта&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;kicker&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;image&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;assets/corpus.jpg&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:[&quot;rgb(0,101,155)&quot;,&quot;rgb(48,176,199)&quot;,&quot;rgb(170,136,99)&quot;,&quot;rgb(88,86,214)&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const img = this.props.image;
    return {
      href: this.props.href ?? "#",
      tone: this.props.tone ?? "rgb(0,101,155)",
      kicker: this.props.kicker ?? "",
      title: this.props.title ?? "Приёмная кампания 2024 открыта",
      imageCss: img ? `url("${img}")` : "none",
    };
  }
}
</script>
</body>
</html>
