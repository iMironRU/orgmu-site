<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>body{margin:0;background:rgb(251,251,251);}@media(max-width:768px){.rail-col{display:none!important}.pg-main{padding:24px 20px 48px!important}}</style>
</helmet>
<div style="display:flex; align-items:stretch; min-height:100vh; background:rgb(251,251,251); font-family:'Roboto Condensed',sans-serif;">
  <div class="rail-col" style="flex:0 0 auto; align-self:stretch; display:flex;"><dc-import name="SideRail" hint-size="94px,100%" style="align-self:stretch;"></dc-import></div>

  <div style="flex:1 1 auto; min-width:0; display:flex; flex-direction:column;">
    <dc-import name="SiteHeader" hint-size="100%,120px"></dc-import>

    <div style="background:rgb(0,101,155); color:#fff;">
      <div style="max-width:1146px; margin:0 auto; padding:32px 40px; box-sizing:border-box;">
        <div style="display:flex; align-items:center; gap:8px; font-size:15px; color:rgba(255,255,255,0.7); margin-bottom:14px;">
          <a href="Home.dc.html" style="color:rgba(255,255,255,0.9); text-decoration:none;">Главная</a><span>/</span>
          <span>Мероприятия</span>
        </div>
        <h1 style="margin:0 0 8px; font-family:'Inter',sans-serif; font-weight:700; font-size:40px; line-height:1.1;">Афиша мероприятий</h1>
        <p style="margin:0; max-width:640px; font-size:18px; color:rgba(255,255,255,0.85);">Конференции, дни открытых дверей, лекции, концерты и спортивные события университета.</p>
      </div>
    </div>

    <main class="pg-main" style="max-width:1146px; width:100%; margin:0 auto; padding:36px 40px 64px; box-sizing:border-box; flex:1;">
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:32px;">
        <span style="font-size:15px; font-weight:500; color:#fff; background:rgb(184,57,4); border-radius:999px; padding:8px 18px; cursor:pointer;">Все</span>
        <span style="font-size:15px; font-weight:500; color:rgb(50,100,150); background:#fff; border:1px solid rgb(217,217,217); border-radius:999px; padding:7px 17px; cursor:pointer;">Конференции</span>
        <span style="font-size:15px; font-weight:500; color:rgb(50,100,150); background:#fff; border:1px solid rgb(217,217,217); border-radius:999px; padding:7px 17px; cursor:pointer;">Дни открытых дверей</span>
        <span style="font-size:15px; font-weight:500; color:rgb(50,100,150); background:#fff; border:1px solid rgb(217,217,217); border-radius:999px; padding:7px 17px; cursor:pointer;">Лекции</span>
        <span style="font-size:15px; font-weight:500; color:rgb(50,100,150); background:#fff; border:1px solid rgb(217,217,217); border-radius:999px; padding:7px 17px; cursor:pointer;">Спорт</span>
        <span style="font-size:15px; font-weight:500; color:rgb(50,100,150); background:#fff; border:1px solid rgb(217,217,217); border-radius:999px; padding:7px 17px; cursor:pointer;">Концерты</span>
      </div>

      <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:20px;">
        <sc-for list="{{ events }}" as="e" hint-placeholder-count="6">
          <dc-import name="EventCard" image="{{ e.img }}" day="{{ e.day }}" month="{{ e.month }}" category="{{ e.category }}" title="{{ e.title }}" time="{{ e.time }}" place="{{ e.place }}" hint-size="100%,360px"></dc-import>
        </sc-for>
      </div>
    </main>

    <dc-import name="SiteFooter" hint-size="100%,320px"></dc-import>
    <dc-import name="CookieBanner" hint-size="1px,1px"></dc-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const img = "assets/corpus.jpg";
    const events = [
      { img, day: "20", month: "апр", category: "День открытых дверей", title: "День открытых дверей ОрГМУ", time: "11:00–15:00", place: "Главный корпус, актовый зал" },
      { img, day: "24", month: "апр", category: "Конференция", title: "Молодёжная научная конференция «Актуальные вопросы медицины»", time: "10:00", place: "Конференц-зал, корпус №2" },
      { img, day: "27", month: "апр", category: "Спорт", title: "Легкоатлетический марафон здоровья", time: "09:00", place: "Стадион «Динамо»" },
      { img, day: "5", month: "мая", category: "Концерт", title: "Концерт ко Дню Победы", time: "18:00", place: "Актовый зал" },
      { img, day: "12", month: "мая", category: "Лекция", title: "Открытая лекция «Кардиология сегодня»", time: "15:00", place: "Аудитория 301" },
      { img, day: "18", month: "мая", category: "Конференция", title: "Международный симпозиум по неврологии", time: "10:00", place: "Конференц-зал, корпус №1" },
    ];
    return { events };
  }
}
</script>
</body>
</html>
