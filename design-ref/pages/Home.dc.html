<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>body{margin:0;background:rgb(251,251,251);}@media(max-width:768px){.rail-col{display:none!important}.pg-hero{height:auto!important;padding:36px 0!important}.pg-main{padding:32px 20px 48px!important;gap:40px!important}.tiles-grid{display:none!important}.tiles-mobile{display:block!important}.banner-page{grid-template-columns:1fr!important}}</style>
</helmet>
<div style="display:flex; align-items:stretch; min-height:100vh; background:rgb(251,251,251); font-family:'Roboto Condensed',sans-serif;">

  <div class="rail-col" style="flex:0 0 auto; align-self:stretch; display:flex;"><dc-import name="SideRail" hint-size="94px,100%" style="align-self:stretch;"></dc-import></div>

  <div style="flex:1 1 auto; min-width:0; display:flex; flex-direction:column;">
    <dc-import name="SiteHeader" hint-size="100%,120px"></dc-import>

    <!-- Hero -->
    <div class="pg-hero" style="position:relative; height:clamp(260px,38vw,360px); background:url('assets/corpus.jpg') center/cover no-repeat;">
      <div style="position:absolute; inset:0; background:linear-gradient(90deg, rgba(0,79,122,0.82) 0%, rgba(0,101,155,0.55) 55%, rgba(0,101,155,0.1) 100%);"></div>
      <div style="position:relative; max-width:1146px; margin:0 auto; height:100%; padding:0 clamp(20px,5vw,40px); display:flex; flex-direction:column; justify-content:center; gap:16px;">
        <span style="font-weight:700; font-size:15px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.85);">С 1944 года</span>
        <h1 style="margin:0; max-width:720px; font-family:'Inter',sans-serif; font-weight:700; font-size:clamp(26px,5vw,44px); line-height:1.08; color:#fff; text-wrap:balance;">Оренбургский государственный медицинский университет</h1>
        <div style="display:flex; gap:12px; margin-top:8px; flex-wrap:wrap;">
          <button style="font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:17px; color:rgb(0,101,155); background:#fff; border:none; border-radius:8px; padding:12px 22px; cursor:pointer;">Абитуриенту</button>
          <button style="font-family:'Roboto Condensed',sans-serif; font-weight:700; font-size:17px; color:#fff; background:none; border:2px solid rgba(255,255,255,0.7); border-radius:8px; padding:10px 20px; cursor:pointer;">О университете</button>
        </div>
      </div>
    </div>

    <main class="pg-main" style="max-width:1146px; width:100%; margin:0 auto; padding:48px 40px 64px; display:flex; flex-direction:column; gap:56px; box-sizing:border-box;">

      <!-- Announcements (urgent / important, with lifespan) -->
      <dc-import name="AnnouncementBar" hint-size="100%,140px" style="margin-bottom:-16px;"></dc-import>

      <!-- Tiles -->
      <section>
        <div class="tiles-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:16px;">
          <dc-import name="Tile" label="Клиника ОрГМУ" icon="heart" accent="rgb(48,176,199)" hint-size="100%,90px"></dc-import>
          <dc-import name="Tile" label="Институт профессионального образования" icon="cap" accent="rgb(184,57,4)" hint-size="100%,90px"></dc-import>
          <dc-import name="Tile" label="Научно-исследовательский центр" icon="science" accent="rgb(88,86,214)" hint-size="100%,90px"></dc-import>
          <dc-import name="Tile" label="Музей истории ОрГМУ" icon="museum" accent="rgb(170,136,99)" hint-size="100%,90px"></dc-import>
          <dc-import name="Tile" label="Библиотека ОрГМУ" icon="book" accent="rgb(0,101,155)" hint-size="100%,90px"></dc-import>
          <dc-import name="Tile" variant="all" label="Посмотреть все" href="Sitemap.dc.html" accent="rgb(0,101,155)" hint-size="100%,90px"></dc-import>
        </div>
        <div class="tiles-mobile" style="display:none;">
          <dc-import name="Tile" variant="all" label="Сайты вуза" href="Sitemap.dc.html" accent="rgb(0,101,155)" hint-size="100%,90px"></dc-import>
        </div>
      </section>

      <!-- Banners slider: 2 per view -->
      <dc-import name="BannerSlider" hint-size="100%,220px"></dc-import>

      <!-- News -->
      <section>
        <div style="display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:24px; border-bottom:2px solid rgb(137,191,234); padding-bottom:12px;">
          <h2 style="margin:0; font-family:'Inter',sans-serif; font-weight:700; font-size:33px; color:rgb(0,101,155);">Новости</h2>
          <a href="News.dc.html" style="font-weight:700; font-size:18px; color:rgb(184,57,4); text-decoration:none;">Все новости →</a>
        </div>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:20px;">
          <dc-import name="NewsCard" image="assets/corpus.jpg" date="3 октября 2023" title="Второй этап конкурса «Лучший врач педиатр участковый»" excerpt="Прошло тестирование практических навыков врачей педиатров участковых в обучающем центре." hint-size="100%,360px"></dc-import>
          <dc-import name="NewsCard" image="assets/corpus.jpg" date="26 сентября 2023" title="Международные студенческие обмены. Опыт и перспективы" excerpt="Встреча с представителями зарубежных вузов-партнёров университета." hint-size="100%,360px"></dc-import>
          <dc-import name="NewsCard" image="assets/corpus.jpg" date="16 сентября 2023" title="Встреча выпускников 1983 года" excerpt="В стенах альма-матер собрались выпускники лечебного факультета." hint-size="100%,360px"></dc-import>
        </div>
      </section>

      <!-- Events showcase -->
      <section>
        <div style="display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:24px; border-bottom:2px solid rgb(137,191,234); padding-bottom:12px;">
          <h2 style="margin:0; font-family:'Inter',sans-serif; font-weight:700; font-size:33px; color:rgb(0,101,155);">Мероприятия</h2>
          <a href="Events.dc.html" style="font-weight:700; font-size:18px; color:rgb(184,57,4); text-decoration:none;">Вся афиша →</a>
        </div>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px;">
          <dc-import name="EventCard" image="assets/corpus.jpg" day="20" month="апр" category="День открытых дверей" title="День открытых дверей ОрГМУ" time="11:00–15:00" place="Главный корпус, актовый зал" hint-size="100%,360px"></dc-import>
          <dc-import name="EventCard" image="assets/corpus.jpg" day="24" month="апр" category="Конференция" title="Молодёжная научная конференция" time="10:00" place="Конференц-зал, корпус №2" hint-size="100%,360px"></dc-import>
          <dc-import name="EventCard" image="assets/corpus.jpg" day="27" month="апр" category="Спорт" title="Легкоатлетический марафон здоровья" time="09:00" place="Стадион «Динамо»" hint-size="100%,360px"></dc-import>
        </div>
      </section>

    </main>

    <dc-import name="SiteFooter" hint-size="100%,320px"></dc-import>
    <dc-import name="CookieBanner" hint-size="1px,1px"></dc-import>
  </div>
</div>
</x-dc>
</body>
</html>
