name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Вызывается скрапером новостей: его коммит сам деплой не запускает —
  # GitHub не триггерит workflow на пуш, сделанный штатным GITHUB_TOKEN
  # (защита от рекурсии). Поэтому сборку зовём явно.
  workflow_call:

# Права для деплоя на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно только один деплой; новые пуши отменяют текущий прогон
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Именно вершину ветки, а не github.sha: когда деплой вызван
          # скрапером, свежий коммит с новостями сделан уже внутри прогона и
          # в github.sha его нет — собралось бы состояние до новостей.
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build (static export)
        env:
          # Сайт живёт в КОРНЕ своего домена (new.orgma.ru), поэтому basePath
          # пустой. Домен задан в настройках Pages репозитория — при сборке
          # через Actions файл public/CNAME на это не влияет, не заводите его.
          # Если домен когда-нибудь снимут, сайт вернётся на
          # imiron.ru/orgmu-site и сюда надо будет вернуть
          # ${{ steps.pages.outputs.base_path }}.
          NEXT_PUBLIC_BASE_PATH: ""
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      # Вторая площадка: свой сервер вуза. GitHub Pages из внутренней сети
      # доступен не всегда, а сайт нужен именно там — это его основная
      # аудитория. Копия полная, обе площадки собираются из одного и того же
      # out, так что расхождений между ними быть не может.
      #
      # continue-on-error: недоступность внутреннего сервера не должна
      # отменять публикацию на Pages. Уже обжигался на диагностическом шаге,
      # который ронял весь прогон.
      #
      # mirror сравнивает размер и время, поэтому после первой полной заливки
      # (~165 МБ, 17 тыс. файлов) уходит только изменённое — обычно единицы
      # мегабайт. --delete убирает со сервера то, чего больше нет в сборке.
      - name: Установить lftp
        if: ${{ vars.FTP_ENABLED != 'false' }}
        continue-on-error: true
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Выложить на сервер вуза (FTP)
        if: ${{ vars.FTP_ENABLED != 'false' }}
        continue-on-error: true
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ]; then
            echo "FTP не настроен (нет секрета FTP_HOST) — пропускаю."
            exit 0
          fi
          # ssl-allow no: сервер (vsFTPd) на AUTH TLS отвечает 530, шифрования
          # не предлагает. Пароль поэтому ходит открытым текстом — держать его
          # стоит отдельным, только для выкладки, и менять при подозрениях.
          # Без --continue: он дописывает в конец существующего файла, если
          # считает передачу прерванной. На первой заливке это склеило нашу
          # главную с заглушкой хостинга — в index.html оказалось два <title>.
          lftp -c "
            set ftp:ssl-allow no;
            set xfer:clobber on;
            set net:timeout 20;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set ftp:use-mdtm no;
            set mirror:parallel-transfer-count 4;
            open -u \"$FTP_USER\",\"$FTP_PASSWORD\" \"$FTP_HOST\";
            mirror --reverse --delete --verbose=1 out/ public_html/;
          "
          echo "Выложено на $FTP_HOST:/public_html"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
