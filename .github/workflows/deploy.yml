name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права для деплоя на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно только один деплой; новые пуши отменяют текущий прогон
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build (static export)
        env:
          # Сайт живёт в КОРНЕ своего домена (new.orgma.ru), поэтому basePath
          # пустой. Домен задан в настройках Pages репозитория — при сборке
          # через Actions файл public/CNAME на это не влияет, не заводите его.
          # Если домен когда-нибудь снимут, сайт вернётся на
          # imiron.ru/orgmu-site и сюда надо будет вернуть
          # ${{ steps.pages.outputs.base_path }}.
          NEXT_PUBLIC_BASE_PATH: ""
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
