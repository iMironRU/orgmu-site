name: Scrape news (nightly)

on:
  schedule:
    # каждый день в 02:30 МСК (23:30 UTC)
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим скрапинга"
        type: choice
        default: incremental
        options: [incremental, refresh, full]

# нужно право коммитить обновлённые новости обратно в репозиторий
permissions:
  contents: write

concurrency:
  group: scrape-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/scrape/requirements.txt

      - name: Scrape
        run: |
          python scripts/scrape/orgma_k2_scrape.py \
            --mode "${{ github.event.inputs.mode || 'incremental' }}" \
            --media hotlink

      - name: Commit new news
        run: |
          git config user.name  "orgma-news-bot"
          git config user.email "actions@github.com"
          git add content/news
          if git diff --cached --quiet; then
            echo "Новых новостей нет — коммит не нужен."
          else
            count=$(git diff --cached --name-only -- 'content/news/*.json' | grep -v _state | wc -l | tr -d ' ')
            git commit -m "news: обновление ленты (${count} файлов) [skip ci-noop]"
            git push
          fi
