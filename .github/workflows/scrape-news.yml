name: Scrape news

on:
  schedule:
    # ВНИМАНИЕ: cron в GitHub Actions идёт по UTC, а Оренбург — UTC+5.
    # Время ниже указано и по UTC, и по местному, чтобы не пересчитывать заново.
    #
    # Рабочие часы: каждые 2 часа с 09:00 до 17:00 по Оренбургу, пн–пт —
    # новости на orgma.ru публикуют в течение рабочего дня, и ждать до ночи
    # незачем. Режим incremental: берём только то, чего ещё нет.
    - cron: "0 4,6,8,10,12 * * 1-5"   # 09,11,13,15,17 Оренбург, будни
    # Ночной прогон остаётся: подбирает всё, что вышло вечером и в выходные.
    - cron: "30 23 * * *"             # 04:30 Оренбург, ежедневно
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим скрапинга"
        type: choice
        default: incremental
        options: [incremental, refresh, full]

# нужно право коммитить обновлённые новости обратно в репозиторий
permissions:
  contents: write

concurrency:
  group: scrape-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/scrape/requirements.txt

      - name: Scrape
        run: |
          python scripts/scrape/orgma_k2_scrape.py \
            --mode "${{ github.event.inputs.mode || 'incremental' }}" \
            --media hotlink

      - name: Commit new news
        id: commit
        run: |
          git config user.name  "orgma-news-bot"
          git config user.email "actions@github.com"
          git add content/news
          if git diff --cached --quiet; then
            echo "Новых новостей нет — коммит не нужен."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            count=$(git diff --cached --name-only -- 'content/news/*.json' | grep -v _state | wc -l | tr -d ' ')
            git commit -m "news: обновление ленты (${count} файлов)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Свежие новости сразу переводим — иначе английская и казахская ленты
  # отставали бы от русской до следующего ручного прогона.
  translate:
    needs: scrape
    if: needs.scrape.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # коммит бота сделан уже внутри этого прогона
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Перевод новых строк
        env:
          YANDEX_TRANSLATE_KEY: ${{ secrets.YANDEX_TRANSLATE_KEY }}
          YANDEX_FOLDER_ID: ${{ secrets.YANDEX_FOLDER_ID }}
        run: |
          node scripts/i18n/translate.mjs
          # Ручные правки применяем после перевода: если строка появилась
          # впервые, машина её переведёт, а правка тут же перекроет.
          node scripts/i18n/apply-overrides.mjs
      - name: Коммит переводов
        run: |
          git config user.name  "orgma-i18n-bot"
          git config user.email "actions@github.com"
          git add content/i18n
          if git diff --cached --quiet; then
            echo "Новых переводов нет."
          else
            git commit -m "i18n: перевод свежих новостей"
            git push
          fi

  # Пуш бота сам пересборку не запускает (GitHub не триггерит workflow на
  # коммиты от GITHUB_TOKEN), поэтому деплой вызываем явно. Ждём и перевод,
  # чтобы собрать русскую и переведённые версии одной сборкой.
  deploy:
    needs: [scrape, translate]
    if: needs.scrape.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
