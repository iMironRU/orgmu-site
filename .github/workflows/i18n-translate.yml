name: Машинный перевод контента

# Догоняет память переводов: переводит только то, чего в ней ещё нет.
# Записи, вычитанные человеком (status: human), скрипт не трогает.
#
# Запуск ручной. Позже можно повесить следом за скрапером новостей, чтобы
# свежие новости приезжали уже переведёнными.
on:
  workflow_dispatch:
    inputs:
      locale:
        description: "Язык (пусто — оба)"
        type: choice
        default: ""
        options: ["", "en", "kk"]
      dry:
        description: "Только показать объём, не переводить"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: i18n-translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Строки из данных, которые собираются кодом (структура, персоны).
      # Перегенерируем каждый раз: иначе после правки units.json или sveden
      # перевод пошёл бы по устаревшему списку.
      - name: Выгрузка строк из данных
        run: npx tsx scripts/i18n/export-strings.ts

      - name: Перевод
        env:
          YANDEX_TRANSLATE_KEY: ${{ secrets.YANDEX_TRANSLATE_KEY }}
          YANDEX_FOLDER_ID: ${{ secrets.YANDEX_FOLDER_ID }}
        run: |
          ARGS=""
          [ -n "${{ inputs.locale }}" ] && ARGS="--locale ${{ inputs.locale }}"
          [ "${{ inputs.dry }}" = "true" ] && ARGS="$ARGS --dry"
          node scripts/i18n/translate.mjs $ARGS
          node scripts/i18n/apply-overrides.mjs

      - name: Показать примеры переводов
        if: ${{ inputs.dry != true }}
        run: |
          for f in content/i18n/*.json; do
            [ -f "$f" ] || continue
            echo "═══ $f ═══"
            # 8 случайных пар «оригинал → перевод» для оценки качества
            jq -r 'to_entries | .[0:400] | map(select(.value.status=="machine"))
                   | .[0:8][] | "  \(.value.src)\n    → \(.value.text)\n"' "$f"
          done

      - name: Коммит памяти переводов
        id: commit
        if: ${{ inputs.dry != true }}
        run: |
          git config user.name  "orgma-i18n-bot"
          git config user.email "actions@github.com"
          git add content/i18n
          if git diff --cached --quiet; then
            echo "Новых переводов нет."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            n=$(git diff --cached --numstat | awk '{s+=$1} END {print s+0}')
            git commit -m "i18n: машинный перевод (+${n} строк памяти)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Коммит бота сам пересборку не запускает (GitHub не триггерит workflow на
  # пуш от GITHUB_TOKEN), поэтому зовём деплой явно — иначе свежий перевод
  # лежал бы в репозитории, а на сайте оставался старый.
  deploy:
    needs: translate
    if: needs.translate.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
